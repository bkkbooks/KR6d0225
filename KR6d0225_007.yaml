body:
  text: 宋孤山沙門智圓著觀音行門統攝衆行論或曰佛經無量行門不一諸聖偏讚蘭菊各美今滅後行人的依何門修證而獲趣菩提邪對曰經雖無量門雖不同皆佛世利根得悟者爾洎乎滅後聖意有歸唯當依言教思修能至菩提也是故楞嚴一經為付囑之前陳涅槃之先容所以假阿難發起請示行門然後如來敕二十五聖各談所證而令文殊料簡否臧而但以觀音為第一也豈非觀音於耳根悟道以聲塵為教依而思修至于無生乎故曰從聞思修入三摩地當知諸經所說一切行門悉人觀音門中也以悉皆憑教故故至涅槃如來更勤勤誡囑當依四法則涅槃可得焉四法者何耶一近善知識二聽聞正法三思惟其義四如說修行是也或者曰佛世既有於餘根得悟者滅後安得無之若也自當於餘根開悟抑令從耳根者豈契合機緣乎對曰實有於餘根開悟者更令依憑言教如膏助火則轉加其明雖曰抑之其實揚之也其或本無餘根開悟之機妄託高蹤蔑棄言教自言頓了不假筌蹄及驗其所證則全同上慢而自墜塗炭如是之流雖聖言大為之防而比比有之當尋此意自曉觀音門之總攝也故楞嚴曰十方薄伽梵一路涅槃門蓋取十方盡於耳根悟道者說耳於十方界豈無獨於餘法悟道者耶楞嚴證其同於耳根之悟餘法且隱而不彰也淨名經詳之矣或者曰聞思修之三慧楞嚴已前諸經說者亦衆矣何言止在楞嚴耶對曰諸經覆相而談未的簡示若論此土既以音聲為佛事又豈踰聞思修乎故諸經三乘弟子凡有咨問如來許說必先誡之曰諦聽諦聽善思念之既云諦聽豈非聞慧乎既云善思豈非思慧乎既云念之豈非修慧乎但此旨粲然在乎諸經而人惑不知故昧總而認別爾復云何以觀音之總貫諸行之別耶對曰至如普賢安樂之行般舟念佛之門方等但持文殊專坐上生則求往知足彌陀則專趣淨方六度萬行各有偏讚如是等經莫不皆由言說乎故曰觀音之總能貫諸行之別也若不依教則成邪倒故諸經結觀皆言作是觀者名為正觀若他觀者名為邪觀其是之謂乎或者曰若然者則觀音所說三慧開悟之門既總能攝衆行則應無自體矣果於何法而開悟耶對曰子之惑深也豈不知總攝之中而有兩異耶一則專在耳根非從餘法一則觀理直入者謂聞常住真心也然後生滅既滅寂滅現前故曰從聞思修入三摩地也又曰何藉卒勤肯綮修證乎若兼所攝帶事兼修也然則楞嚴開顯咸歸心性心性無外攝無不周若達此旨雖修偏心亦成楞嚴之大定也雖是粗心還成妙境扶律談常事即理故天台智者言正助合行者其是之謂乎惑者曰既聞命矣復有餘疑更請開決且如此方同迷本性何至開悟而惟在耳根耶對曰所迷心性雖同而能迷根塵有異故十方國土於諸根塵各有極利者至如此方但強分在於耳根豈餘根餘法全無悟者耶楞嚴二十四聖非其人耶雖然終成依聲教得悟爾但是少聞聲教而能多思諸法故受別名且如信法兩行豈可法行全不聞耶惑者曰此方達本之人以心傳心不立文字又豈從聲教耳根乎對曰夫達磨之來也將解此方言教之滯縛故曰以心傳心不立文字心如可傳則當一皆證聖則不合有才聞即悟久習無成者也既其兩異豈非祖師依心以立言學者體言而了心又了之有明昧故悟之有前後也何言不立文字耶今之舉揚假言句以詮心是非譬諸因其苗以辨地之肥瘠也故禪者以舉揚言句為苗稼焉請以此觀之達磨之來豈離聲教耳根乎但令達文字即解脫故言不立文字爾惑者欣然再拜僕也而今而後請從事於斯矣不亡羊於岐道矣欲報之恩浩劫難酬對曰噫經有言曰如為一人衆多亦然故吾之說也不獨在於子之一人焉將欲使於如來末法之中一切有緣知乎一切行門一切諸經無不為觀音所攝也子宜命之曰觀音行門統攝衆行論可也有以見觀音於二十五聖中圓通最為第一也又知禮覲供養其福與六十二億河沙菩薩正等良由娑婆修法垂範導利有緣凡六十二億而諸大士皆於餘法開悟不在耳根及其化人還談所證以約化它之多少利物之淺深是故觀音之一乃敵諸聖之多也故知法華六十二億皆楞嚴二十四聖之流類焉論其所證一體無殊故經曰歸元性無二方便有多門又見娑婆一切衆生咸稱念於觀世音者猶其根性同故觀音總攝衆行其昭昭乎其昭昭乎無致惑也常如是流通之使夫一切衆生從聞思修入三摩地者則我願畢矣惑者曰唯唯受教庶斯達焉誓分光於無盡也再拜于堂下循墻而出思益十誡并序東方有梵天曰思益者欲來娑婆彼佛以十法誡之蓋寄聖以訓凡也吾嘗命為思益十誡書之座右以自勉復欲後學知之遂章句出焉亟命剞劂以工庶有益於代也思益經曰東方之國佛號日月光有菩薩梵天曰思益白佛我欲詣娑婆世界佛言便往汝應以十法遊於彼土於毀於譽心無增減聞毀而怒則采讒聞讚而喜則招佞君子用心尚須深戒況乎大士達法本空豈由毀讚而增減其心耶聞善聞惡心無分別彼善彼惡由彼心起復由我心計彼異相心本自無從心所現一切不實以此觀之豈有分別於諸愚智等以悲心不重智而偏與不輕愚而不救等以悲心皆救其苦於上中下衆生之類冤親各有三類心常平等於輕毀供養心無有二於他闕失莫見其過無求備於一人也矧一切衆生皆有佛性不可以過怒而輕之雖或加折伏必以慈濟為心與見種種乘皆是一乘大小雖殊同歸心性不黨己學而蔑彼宗大論偈云自法愛染故毀訾他人法雖持戒行人不脫地獄苦聞三惡道亦莫驚畏雖五無間皆解脫相心苟無瑕何憂何懼於諸菩薩生如來想敬仞學如極果佛出五濁生希有想梵天當以十法遊彼世界時有菩薩白佛我得大利不生如是惡衆生中佛言勿作是語所以者何於此國中百千劫修梵行不如彼土從旦至食無瞋礙心
