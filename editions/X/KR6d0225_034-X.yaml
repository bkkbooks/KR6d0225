body:
  text: 宋孤山沙門智圓著錢唐兜率院界相牓序兜率院者皇朝太平興國元年忠懿王所建也厥事裁訖會王納版藉歸于天子故結界之法無得行也大律師梧公勤以訓人勇於為法大中祥符九年夏四月十三日由寺之聖果而來居焉將傳授乎毗尼涖眾沙門紫其服者曰慈度之請也至止之翼日羣英畢臻梵筵肇啟舉知律者以白二法行結界事起居有儀宣秉有序作法既周大界斯成而今而後依是住者為能秉有成濟之功為所召無奔馳之勞攝衣焉攝食焉說戒焉自恣焉凡曰章可舉而行孰謂其地弱不勝乎噫忠懿經構于前梧公結界于後二者既備道繇是光雖財法之兩殊及其立事一也吾以定慧訓乎來學且知聖道以戒律為始因諾來命序其所以然也遺囑吾甞念沒後殘軀方囑汝輩棄之中野流之長川以飲蜚走鱗介類諒汝輩必不能遵方囑以闍維而斫伐燒所皆密邇塔廟則有臭氣熏穢之咎始欲土葬復慮惑陰陽家流向背吉凶之說抑又妨墾耕之地費信施之財皆吾心所不欲也乃預鑿土窟藏陶器一以為歸全之具吾沒後不須剃頭不須澡洗宜歛以浴衣不得停留即時以錢若衣雇淨人舁送窟所內陶器中窟戶用磚石三兩重甃之不得報俗眷及朋友門人不得發遺書不得變服號咷人或慰之慼容掩泣而已此亦不壞世諦也不得率眾人錢以供喪事所有衣鉢什物一毫以上準律分之臥蹋臥具書厨及內外典籍除他人者悉與如理其瑪瑙院乃為政思齊浩才者或經始之或佐成之仰現前僧同付與三子其或他行則召來付之任彼施為或別請宗師或昆弟共住或承襲講演或易作禪居或更為律院苟無害於人有益於道則無不可若乃立身行道之事息心達本之旨吾述之翰墨不鮮矣此無復言矣其所囑後事遵吾行之則吾法門眷屬世世與師俱生共揚妙道厥或不遵則魔之黨非吾徒也世人或怪汝所行而見責當出此牘以示之天禧己未季春朔手寫于版懸諸講堂之左病夫傳病夫者以其猒猒常病故以為號甞杜門窮居簞食瓢飲不交世俗每精別方書調品藥石以自醫病少間則討論羣籍以自娛或議一事著一文必宗於道本於仁懲乎惡勸乎善甞謂三教之大其不可遺也行五常正三綱得人倫之大體儒有焉絕聖弃智守雌保弱道有焉自因克果反妄歸真俾千變萬態復乎心性釋有焉吾心其病乎三教其藥乎矧病之有三藥可廢邪吾道其鼎乎三教其足乎欲鼎之不覆足可折邪為儒者或以多愛見罪攻異為謗病夫且不易乎世不變其說也時或登山臨水搜吟寫望夭夭如也申申如也不以體中羸耗為苦寂寥自得以矯時態雖富貴權豪而托病不附雖大名厚利而托病不苟雖清商流徵而托病不聽雖膏梁甘旨而托病不嗜由者不為權所動不為名所役不為音所聾不為味所爽不為人所忌不為俗所混而全生之用見素之道盡蘊於病中矣病之時義大矣哉甞作病賦以言其道病賦并序吾甞患脾病語久食飽輒氣喘汗流耳鳴目眩不堪其苦也且夫聖如仲尼達若伯陽累乎有形亦未能逃斯患也然雖凡聖賢愚之所共有句達與不達中心高下如塗漢焉是知悵然不樂為病所困者下愚也泰然無悶以道自持者上智也矧吾稟金方之訓學至真之法豈可以小疾煎熬而忘於道乎抑又甞聞諸天台云夫治病有四焉謂藥治假想治呪術治第一義治吾不敏庶幾上智之道而以理觀為專治蓋第一義之謂也因作賦以導其志云四大相攻五藏不利隱几搘杖乖情惱意性情以道制心以義庶乎斯旨從何取類伊昔仲尼亦有其疾其道皎如請禱惟失伊昔伯陽迺嗟大患其道在焉有身靡間吾師寂默不遠其則方丈寢床其儀不忒病從心作惟病是色色全是心胡為自賊心體本無病從何得藥非芝醫非扁和病斯無病誰涅誰磨病乎病乎其如予何講堂銘能仁去世微言在茲四依不興流通殆而爰命哲人扶顛持危力揚彝訓提綱振維法鼓其鏜法輪載脂為人模範慎爾威儀行道有勇擊蒙忘疲來而不距往而不追摧邪務本顯正務滋其告無瀆其辭無枝善世不伐多聞闕疑辨惑以智攝物以慈勒銘講堂敢告法師窻蟲銘密室有蟲思遊大空窻紙兮有狀而塞空隙兮無形而通無形者非彼所見有狀者是彼所從腦扣擊而欲碎聲啁噍而無窮吾驅之空隙而俾度彼還扣窻紙而如故蟲乎蟲乎徒有出心自昧出路爾將誰咎兮啾啾哀訴
