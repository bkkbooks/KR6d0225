body:
  text: 宋孤山沙門智圓著中庸子傳上中庸子智圓名也無外字也既學西聖之教故姓則隨乎師也嘗砥礪言行以庶乎中庸慮造次顛沛忽忘之因以中庸自號故人亦從而稱之或曰中庸之義其出於儒家者流子浮圖子也安剽竊而稱之耶對曰夫儒釋者言異而理貫也莫不化民俾遷善遠惡也儒者飾身之教故謂之外典也釋者修心之教故謂之內典也惟身與心則內外別矣生民豈越於身心哉非吾二教何以化之乎嘻儒乎釋乎其共為表裏乎故夷狄之周孔之道不行者亦不聞行釋氏之道也世有限於域內者見世籍之不書以人情之不測故厚誣於吾教謂棄之可也世有滯於釋氏者自張大於已學往往以儒為戲豈知夫非仲尼之教則國無以治家無以寧身無以安國不治家不寧身不安釋氏之道何由而行哉故吾修身以儒治心以釋拳拳服膺罔敢懈慢猶恐不至於道也況棄之乎嗚呼好儒以惡釋貴釋以賤儒豈能庶中庸乎或者避席曰儒之明中庸也吾聞之於中庸篇矣釋之明中庸未之聞也子姑為我說之中庸子曰居吾語汝釋之言中庸者龍樹所謂中道義也曰其義何邪曰夫諸法云云一心所變心無狀也法豈有哉亡之彌存性本具也存之彌亡體非有也非亡非存中義著也此三者派之而不可分混之而不可同充十方而非廣亘三世而非深渾渾爾灝灝爾衆生者迷斯者也諸佛者悟斯者也噫能仁千萬言說豈逾此旨乎去聖遠微言絶學之者攀枝捨其根挹流忘其源於是乎或蕩於空或膠於有蕩於空者謂泯然其無得寂然其無眹誰為凡乎誰為聖乎及其失也迷因果混善惡棄戒律背禮義膠於有者硜然執有修彰然著有法凡豈即聖乎自豈即他乎及其失也固物我而不可移泥怨親而不可解拘縛於近教殺喪於遠理曰蕩空膠有孰良曰蕩空也過膠有也不及然則空愈與曰過猶不及也唯中道為良敢問中道曰適言其有也泯乎無得誰云有乎適言其無也煥乎有象誰云無乎由是有不離無其得也怨親等焉物我齊焉近教通焉遠理至焉無不離有其得也因果明焉善惡分焉戒律用焉禮義修焉大矣哉中道也妙萬法之名乎稱本性之謂乎苟達之矣空有其無著於中豈有著乎嗚呼世之大病者豈越乎執儒釋以相誣限有無以相非故吾以中庸自號以自正俾無咎也或者曰唯唯庶斯達矣再拜而出中庸子傳中初中庸子之生也始言則知孝悌父母頗異之而不羣於庸竪戲嘗以草木濡水畫石以習文字採花布以為徒自為講訓之狀唯言孝父母睦兄弟而已酷有邁俗志父母不能違因捨為佛徒年八歲遂登具於錢唐龍興寺今大中祥符寺也十五微知騷雅好為唐律詩二十一將從師受周孔書宗其道學為文以訓世會寢疾因自訟曰汝浮圖子髮既祝矣形且毀矣而不習釋氏志慕儒學忘本背義又豈稱周孔之旨乎汝姑習釋後學儒為副汝其圖之時源清法師傳智者三觀之法于奉先豫負笈而造焉在青矜之列者凡三年會師亡既而離群索居衣或殫糧或罄因之以疾病而孳孳然研考經論探索義觀得之於心而不尚夸耀人或謂之愚且訥豫聞之曰學道貴達本息心也若炫其能矜其解欲他之買者吾不如行商坐賈也嘗歎天台宗教自荊溪師沒其微言奧旨墜地而不振者多矣雖行而說者違道背義亦衆矣於是留意於筆削且有扶持之志凡形百餘萬言以廣其道或謂曰荊溪既沒解不在子乎唯名之與行比荊溪猶塗漢之相遠耶豫應曰解即未也名之與行然哉然哉豫著述人或非之門人以告豫豫曰文中子有言智者非之吾當飾辭往謝愚者非之吾將奈何且吾將扶聖道以潛潤於人也苟吾言之是後世必有如吾者好之如其非也灰滅不旋踵矣噫吾之道豈止與狺狺者爭勝哉無賴輩或背毀豫既而革面而來豫待之盡禮人問其故答曰賓象天主象地待不以禮是違天也違天不祥且彼謗我也果實乎果虗乎果實也吾將改之彼乃訓我也是吾師也何怒之有果虗也吾可笑以為樂又何怨之況毀讚之言如谷響邪中庸子傳下中庸子生十三年夢隨佛入于海夏滿行矣從至曠野有物似世畫鬼神者佛垂訓久之年三十尋涅槃經果有降曠野鬼神之事及撰涅槃記夢二沙門曰龍樹觀音與之語且久豫因著記夢一篇或謂豫曰夢者游魂偶然豈實乎安用記之其為人妖也子曰嘻萬法一空皆如夢也百年大夢也一夕小夢也苟大夢之可記小夢于何不可記乎苟知小夢之虗也胡不達大夢之虗邪吾之記夢其有意焉罪我者其記夢乎知我者其記夢乎豫之訓後學也雖屢見違後又訓之其或去者無一言以留之曰來而不距往而不追古之道也或觸事擊發不能容忍俄而悔之不好相形不好問命不好擇日於是撰福善禍淫論擇日說以矯時俗未嘗登有位者之門曰淡臺滅明非公事未嘗至於偃之室矧吾方外之人乎求知於有位者士人之事耳吾削染矣敢亂四民之業哉吾非慠也豫多抱疾嘗自稱病夫著病夫傳雖羸耗癯瘠而不倦講道以誨人三藏典誥洎周孔荀孟楊雄王通之書往往行披坐擁撰自針七針勒石於座石以自誡居于孤山之陽草屋竹床怡然自得且曰與其奢也寧儉吾從事於斯矣矛嘗謂門人曰吾沒後無厚葬以罪我無擇地建塔以誣我無謁有位求銘記以虗美我汝宜以陶器二合而瘞之立石標前志其年月名字而已豫聞人之有善未及稱之若病之未瘳見人之不善未及諫之亦若病之未瘳客有談不合理者則默而不答陽秋四十有一論曰中庸之德人鮮久矣而能以中庸自號履而行之者難矣哉世或之詐吾取詐焉
