body:
  text: 宋孤山沙門智圓著贈詩僧保暹師吟檻漾寒水平湖煙景間無人識高趣盡日對空山晚樹舂禽語晴窗夜月還新編皆雅正不待仲尼刪寄石城行光長老幽棲塵想絶岩閣倚杉松吟思禪中盡霜髭病後濃溪間澄夜月山靜答秋鐘寂寞懷高趣殘陽獨倚笻寄仁姪庭木西風動間軒落葉稠夢回霜月曉信斷海山秋道性歸無念孤吟已絶愁況疏林下約煙水路悠悠山行策杖乘間興山深人迹稀斷橋摧宿雨高樹桂殘暉嵓靜雲孤起潭空鳥獨飛前峯有蘭若吟賞自忘歸秋日感事滿眼皆相識論心自不同間門扃夕照敗葉落西風往事全成夢浮生漸覺空搘獨無語四壁響秋蟲湖上晚望寄友人不得天涯信相思對景濃驚飈吹落葉殘日在遙峰照水魚村火沈煙野寺鐘幽懷向誰説靜立自搘笻贈聞聰師淡然塵慮絶禪外苦風騷性覺眠雲僻名因背俗高水煙蒸紙帳寒髮澀銅刀幾宿秋江寺間吟聽夜濤送僧歸饒陽執手離亭暮言歸思不禁故鄉千里外為客十年心帆影寒江靜猿啼雪嶠深饒陽泉石在講退自堪吟悼廣鈞師北僧傳示滅高迹更難尋故國房空在新墳草已深雲泉違舊約風月罷論心默坐看遺偈西窗月又沈次韻酬鄰僧晝上人居止間相近臨流野色分深秋山共見清夜磬交聞靜榻移明月疏簾卷暮雲相於別有趣冷淡況同群旅中別趙璞策馬將登路星河曙色分殘燈照離席來鴈咽寒雲鄉遠書難到吟狂酒易醺堪嗟經濟術未得致明君旅中即事寄友生欹枕不成夢寒蟲叫壁陰高梧深夜雨遠客故鄉心分與浮名背年將白髮侵終須約宗炳結社向東林秋晚客舍寄故山友僧隱几不成寢何人慰寂寥空階鳴蟋蟀寒雨滴芭蕉靜語窗燈暗歸心海寺遙唯應釋慧遠蓮社為相招寄輦下譯經正覺大師水國無歸夢年來帝澤深梵書翻宋語道論變吳音靜室清香凝間庭古樹陰玉華前事在高迹許誰尋寄潤姪法師庭木凝秋色依依廢苦吟來書江上絶幽夢雨中深水鳥間窺硯窗燈冷照琴誰知此時興華髮暗相侵贈白蓮社主圓淨大師社客盡卿相草堂雲樹間景分廬嶽秀人類遠公間夜定開明月秋吟對暮山唯應謝康樂時得扣松關春晚言懷寄聰上人晚樹歸禽亂翛然古院空清談遠君子幽興寄絲桐短髮全成雪殘花半逐風終期結真侶歸老亂雲中留題因師院石楠花陽和資萬木獨此異群花映草驚殘燒臨窗認曉霞色雖因雨減勢不逐風斜幸賴栽培力繁枝鬬日華寄省悟師平湖波渺渺蹤迹杳難尋城裏無時到雲邊閉戶深寒燈明古像晚磬出疏林寂寞懷高趣西軒日易沈留題聞氏林亭小山簷前狀奇險咫尺見清幽鳥下疑靈鷲僧過認沃洲危遮虗檻月冷奪遠峯秋始信紅塵裏豪家有勝遊宿仲係上人房偶從支遁約深夜宿間房窗靜燈遺燼庭寒樹有霜禪心論的的塵事省茫茫又説天台去林間掃石床題聰上人林亭四面遠塵迹吟過稱野情階間秋果落池冷月華生倚竹蟬聲斷開琴鶴夢驚却來還有約未可猒逢迎書久上人城中幽齋杉竹匝吟徑軒窗更絶塵清風生後夜幽景遍諸鄰磬斷棲禽夢香凝出定身城中有高趣寧羡賴留人江上作往事那堪問長江空渺然孤城閉殘日荒隴積寒煙沙漲中洲闊潮衝古路偏莫疑陵谷事即目是桑田懷保暹師高迹知何處相懷早晚休苦吟空對月閉戶更禁秋砌隙寒蟲切林稍下葉稠音書杳難寄天闊水悠悠贈宣密大師不出院侯門休請謁香火務真修古院扃蒼蘚他山空舊遊出禪庭月曉開卷竹窗秋已得棲幽趣何須買沃洲懷中姪一從林下別倐忽又經年舊約山空在相懷月屢圓郡鍾宵斷夢江樹晚沈煙書札憑誰寄波濤況渺然宿道場山寺絶頂秋氣清危欄憑樹杪仰窺清漢近下視群峯小空池生夜月風枝鳴宿鳥吟坐不成寐疏鍾起將曉送遇貞師歸四明山吟餘江上別一錫寄扁舟遠度浮殘照千峯指舊遊疏鍾沈杳靄羣木落高秋莫負重來約禪心本自由秋夕寄友僧白雲高臥者滯疾阻相尋信斷滄洲闊房扃翠嶽深寒蟲藏壞壁庭樹滴殘霖早晚同間話孤燈照苦吟
