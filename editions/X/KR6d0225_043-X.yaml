body:
  text: 宋孤山沙門智圓著寄華亭虗己師懶答公卿信高眠野興濃虗堂開夜月孤枕度秋鐘臨水成新作看雲憶舊峯林間仍抱疾早晚遂相逢旅舍言懷旅舍少相識孤吟俗態分客情生夜雨歸夢入秋雲砌冷螢頻過牕幽鴈忽聞西峯泉石在終去謝人群上錢唐太守薛大諫分符江郡遠貴列七人間文古淳風在時清諫筆閑樓高喧暮角廳冷鏁秋山聖代期調鼎軒車即詔還贈守能師高臥湖山畔塵機任萬端連雲吟閣靜度水講鐘寒幽戶花時閉新書雪夜刊師甞撰典類一百卷却應趨競者相笑隱林巒潮羅剎江心起晨昏信不差寒聲喧極浦秋勢卷平沙望立人心險驚飛鳥影斜來源爭可問滄海況無涯送夤上人歸道場山行行擕錫別幽景到山分殘雪經春在疎鐘度水聞松深生晚吹潭靜照閑雲巖閣重開講清香入夜焚宿山院一宿無塵境相留靜話長秋聲歸古木月色滿空廊嵐氣侵衣潤溪泉漱齒涼終期整缾錫來此掩閑房贈簡上人澹然人外趣萬事已無求花院春深講雲山夏滿遊汲泉苔井曉鳴磬竹牕秋別有幽期在香燈老沃洲苔與僻偏饒分蒼蒼稱靜吟閑堦經雨徧峭壁度秋深色冷分禽跡痕幽入樹陰衡門終歲在車馬絕相侵寄楚南師昔年江上別高跡杳難尋浮世人稀見青山隱更深琢詩窮有象體道極無心慚負眠雲約西峯夕照陰江亭晚望江亭閑寫望秋景正無窮鳥沒寒雲外帆歸暮色中淡煙生極浦敗葉墜涼風迴道聞漁唱人家隔葦藂登武林高峯千尋堆冷碧極頂絕塵蹤雨霽聞清籟雲開見別峯落泉噴怪石驚鳥入深松吟罷凭欄久遙天起暮鐘懷子仁師寥寥塵跡遠禪外動閑思水國人歸後秋軒月白時鳴蛩藏壞壁幽鳥立寒枝獨坐誰相問微吟鑷病髭書懷一錫任西東孤懷孰與同吟髭潛變白人事旋成空秋閣閑看月寒牕臥聽鴻時將寂寥意深夜寄絲桐寄棲白師深隱空林下清幽絕外緣雨牕封嶽信苔井濾秋泉門靜來沙鳥庭閑噪晚蟬凭欄獨相憶殘日下遙天贈郝逸人故國伊川遠深居碧嶂前伴吟唯有鶴高趣別無仙嶽信閑慵答丹經秘不傳杖黎時訪我終日話南禪遊靈隱山峭壁侵宵極靈蹤不猒尋閑思曾有夢歸隱豈無心絕碧煙霞麗幽巖洞穴深那堪思慧理殘日白猿吟謝擇梧律師惠竹杖剪自幽巖側高僧忽見遺看雲欹盡日書雪握多時節冷蟲微蠧根閑蘚暗滋舊山泉石在歸去賴扶持梵天寺閑居書事松杉圍靜室蹤跡遠人羣抱疾添華髮看山羡白雲苔痕經雨長蟬韻帶風聞獨坐無來客西軒日又曛鍊丹井仙去遺蹤在泠泠翠嶽邊泠光涵碧甃暗脉洩寒泉月映氷壺淺秋澄古鑑圓羽人居止近閑汲灌芝田冷泉亭亭幽無俗狀清景滌煩僸砌壓寒流淺簷分積翠深晚花閑照影古木冷垂陰凭檻不能去澄澄發靜吟贈僧諸祖參尋徧消搖髮未華舊房扃海外孤跡寄天涯琢句秋牕月觀空晚砌華時來說高趣終去隱煙霞湖居秋日病起六韻舊識稀相訪寥寥掩壞房鼎深殘藥在頷瘦白髭長塵點沾書篋苔痕汙石牀簷幽蟲織網砌冷菊含香靜思憐深夜清羸怯晚涼雲峰歸未得閑坐詠滄浪贈夷中師澹泊背時態翛然塵外心靜吟霜月盡歸夢海雲深室冷苔生榻牕閑鳥覰琴幽棲共得趣乘興幾相尋寄圓長老澹慮棲幽境閑將水石隣信衣傳往祖禪語示來人晚屋茶煙細晴軒岳翠勻相懷獨南望林木又經春同友人宿山院共依清境宿話道復論文潭月秋深見山鐘夜後聞蟲聲沉古砌螢影沒殘雲會約長棲此爐香樹下焚贈清曉師道勝塵機息講餘林葉枯清名高臥遠黑髮苦吟無庭靜秋雲澹牕閑夜月孤時聞適幽興上閣望平湖寄德聰師古院稽山下幽棲猒客尋機心禪外盡詩思病來深缾水寒凘結杉風晚磬沉他時若招隱香火繼東林上方院禪扉開絕頂海色映層巒剎影浸寥泬鐘聲度渺漫荒苔幽徑滑冬雪暮牕寒吟罷慵迴首遲遲獨凭欄登樓懷遵易閑景杳無極凭欄思若何鳥行沈遠岳秋色滿滄波來信經年絕新愁向晚多依依自吟望舊約負煙蘿
