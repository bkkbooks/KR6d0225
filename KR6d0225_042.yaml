body:
  text: 宋孤山沙門智圓著自針心語無外汝聽吾誨詐偽勿行仁義勿背苟為詐偽終其禍對苟為仁義終與福會汝無沽名怪誕任情汝無附勢容媚罔制己能勿矜他賢勿蔽讚汝無喜毀汝無怒過勿憚改惟道是務亦莫愛死亦莫貪生樂善修心時至則行身乎身乎吾與汝盟七針并序中庸子永懷有所感激遂為七針俾夫口之談身之為心之思足之履手之執眼之視耳之聽而不失其正也雖曰自誡豈無意於訓世邪口針口兮莫語口兮莫默語或有益萬人是則語或無益自讒自賊為益莫語有益莫默口兮無惑身針執爾之容謹爾之躬勿羡狐貉之溫勿恥弊縕之窮勿夸毗兮苟順勿滔天兮象恭成仁兮可殺非義兮莫從身乎身乎道在其中心針善也爾性稟之天命七情交亂遂失其正苟性其情聖道則明無感物而變無隨勢而傾作為斯針心焉是程足針莫踐春冰莫履權門春冰易陷權門易失足爾慎乎無喪我軀手針無學曹沫之非禮兮執刃劫桓公當學朱雲之正諫兮折檻示英雄抱義兮忌失驅邪兮務疾手乎日慎一日眼針勿視秋毫恐損汝睛勿觀五色恐喪汝明宜視道之邪正宜觀事之虗盈眼乎斯守無背吾盟耳針聞正道兮宜乎聰聞邪説兮宜乎聾既聰既聾時乃功耳兮勉之去斯就斯寄題梵天聖果二寺兼簡昭梧二上人并序梵天聖果二剎相望而高軒虗閣盡得江山之勝槩因誦謝宣城天際識歸舟雲中辨江樹之句頗類彼景乃以為韻成詩十章用寄梵天昭師聖果梧師二開士雖不足發揮騷雅庶寫乎相懷之心爾江色杳無極渺渺接遙天歸帆帶夕陽去鳥沈寒煙幽景不同觀遐想成斯篇樓閣聳岧嶤參差極雲際高窗曉色先晚景餘霞麗寥寥羣動息冥心遠塵世冷淡杳難羣幽趣唯吾識高情薄雲漢清談潤金石不學浮世人奔名競雕飾性靜百慮忘軒間萬象歸空江答夜鐘高嶠留殘暉幽砌絶塵蹤孤雲自依依顧惡如探湯觸物類虗舟他人莫己知此道本吾求獨坐時相懷斜陽照危樓崔嵬高山側觸石生片雲自將風雨期不與塵土羣杳杳遊太虗對此幾思君高迹將誰親幽棲白雲中間階吐蒼苔古木生清風時將西竺書講義訓來蒙靜躁各所好是非安能辨聲利如我仇雲泉若相勉寂寂深林中芳蘭自堪搴群峰聳危碧倒影沈空江清景生晚晴冷色涵虗窗消搖縱吟賞能使吾心降海日照吟軒江風動庭樹此景樂間情何人識高趣登樓獨南望杳杳空煙霧湖西雜感詩并序湖西雜感詩者中庸子居西湖之西孤山之墟傷風俗之浮薄而作也雖山謳野詠而善善惡惡頌焉刺焉亦風人之旨也興致不一故曰雜感凡二十章湖波冷淡絶纖塵滿目雲山是四鄰一徑草深人不到竹牀蒲扇養天真看雲靜放支公鶴臨水間觀惠子魚窗下寂寥何所有竺乾經卷仲尼書間庭庭畔植梧桐上有新蟬噪晚風咽咽清音正堪聽無端驚斷彼兒童移得煙溪竹數竿間庭栽處緑陰寒虗心高節真堪愛不放常人暫入看鳳為時瑞世傳名及現郊村衆盡驚喚作怪禽宜彈殺始知流俗重虗聲直木風摧秋敗蘭間觀庭際可長歎屈原溺水伍員死孤潔由來獨立難尼父立言敦禮樂能仁埀訓勵慈悲堪嗟世路營營者狡貪殘都不知不省浮生大患身諂求終日走紅塵一朝死至名隨沒滿屋黃金屬別人猛虎磨牙踞蔭林幽幽一路晚煙深行行君子休疑懼此物由來食獸心留心儉讓唐虞道恣意貪求桀跖徒間坐思量茆屋下夜深秋月照平湖蘭在深林亦自馨豈因風雨阻雞鳴由來君子須謀道不為時人有重輕白犬宵行似有情為防暴客到天明近來守禦無功績不吠人形只吠聲伯陽道德釋迦心夫子文章盡可尋飽食暖衣都不顧可憐容易過光陰雪晴山院景堪躋王樹瓊樓照碧溪日暮忽驚銷爍盡百年豪富事還齊月照間軒虧復盈吉凶消長勢相傾須知人事同天道寵辱由來盡可驚草堂間坐念編民多尚浮虗少尚真禮讓不修難致福唯知燒紙祭淫神陰陽家説惑常民孝道從茲盡失倫廬墓三年誰肯也競談岡勢益生人福善禍淫言可信吉凶由己語堪陳乖仁背義都無恥只記臨行揀日辰靜思塵世事茫茫策杖間吟出草堂欲喻浮生那遠覔芭蕉昨夜已經霜鑿得新泉古砌頭煮茶滋味異常流夜來間看澄明性天上無雲月正秋
