body:
  text: 宋孤山沙門智圓著陳宮龍盤虎踞景堪尋王氣消亡信禍淫結綺臨春何處是數聲啼鳥暮煙深春日別同志路岐南北與東西竚立遲遲惜解擕忍向離亭折楊柳𣆶花零落杜䳌啼夏日湖上寄太白長老風撼芙蕖入座香水軒間坐趣何長相懷不是人間景隔岸歸禽噪晚涼西湖清帶月華涵竹戶冷澄秋色照禪衣滔滔潤物知多少極目寒波漾落暉送禪者祖意曾明萬事間誰云方外與人間卷衣江上秋來別處處禪心朵朵山古意登山伐樵柯忽折臨井汲泉綆仍絶音信不來無處說朔風飄飄滿天雪雲冷照碧潭間不極靜當青漢影彌分卷舒終合為霖雨不向陽臺惑楚君苔錢三首夷甫不言非爾類魯為論偶同名秋來自滿虗間地不用良工鼓鑄成其一求多未必增貪𥪰委積唯堪貰寂寥顏子黔婁舊居畔亂鋪平地伴逍遙其二爐冶只應憑陋巷富饒應不是豪家𣆶來雨歇茆堂外散在間庭買落花其三自遣三首古屋苔荒疾乍瘳前村林木覺先秋野塘日暮搘笻立雲自無依水自流其一講退時時學苦吟人間聲利已無心水邊占得清間景雨霽遙峰夜月深其二不惑年猶缺四年道情高趣恥前賢清風明月知多少謾學廬山種白蓮其三送僧萬緣難繫自由身道性何妨學世人擬向東門贈離別長堤楊柳未成春庭竹移去羣花種此君滿庭寒翠更無塵暑天間繞煩襟盡猶有清風借四鄰雞簷前棲息傍蒿叢風雨司晨爾有功鸚鵡無能憑舌侯門翻得養金籠送僧之金陵金錫孤𢹂問去程萋萋原草暮煙平六朝舊跡秦淮畔應感興亡聽水聲出道場山途中作獨下層巒景物秋依依雲木似相留孤舟曉泛平波去更為青山一轉頭將之霅溪寄別擇梧師白雲深處草堂間曾伴支公薄暮還獨上孤舟欲西去倚檣回望只青山寄淨慈寺悟真師憶得涼宵宿上方靜吟間話趣何長別來音信無由寄目斷遙天鴈一行次韻酬梵天闍梨數峰殘雪對間門世態悠悠莫可論靜室禪餘忽相憶劃灰孤坐到黃昏溪居即事寄梵天闍梨松竹森森獨掩扉塵中誰復愛忘機蒼苔滿砌無人到猶感幽禽夜夜歸武康溪居即事寄寶印大師四首偶來溪上縱間吟泉石深藏便有心莫擬他年訪幽跡白雲青嶂更難尋其一月下猿聲水畔山臥聽吟望只宜間柴門不掩無來客時有精靈暫往還其二世路驅驅又白頭爭如間臥絶他求門前荒隴依依在折松枯盡列侯其三禪外相懷雪乍晴音書早𣆶到柴扃殘陽獨倚危樓望極目山光數點青其四瑪瑙院居戲題三首水邊間臥萬緣休言欲無瑕行欲修草屋衡門任窮困屠龍終自勝屠牛其一湖光淡淡涵幽戶苔色依依滿破廊寂寞便同夫子廟更無流俗入焚香其二白傳湖西瑪瑙坡軒窗蕭灑漾煙波講餘終日焚香坐毀譽榮枯奈我何其三豫近卜居孤山之下友人元敏以四絶見嘲遂依韻和酬窮居已躡黔婁跡孤島徒稱瑪瑙坡糗飯藜羮且間樂更無車馬暫經過其一所棲幽致異人寰野艇秋歸碧浪間殘日淡煙凝望處參差樓閣認孤山其二煙波雲木映間扉養病深棲是所宜便欲上生尋內院却因泉石住多時其三虗堂入夏講殘經不擊鐘聲擊鼓聲林下唯君問幽趣紀陽儀式近方成後漢董春字紀陽每升講堂鳴鼓三通余近斆焉其四庭鶴支遁放君真有意衛公憐汝太無端司晨守禦那堪用殷頂霜毛只好看寄天台守能上人台嶺林泉勝十洲忘機長往更無愁考盤高趣何人識招隱新題幾處留深夜定回華頂月經年書斷海門秋誰知抱疾西湖上南望雲山想勝游寄所知寵辱不關念揚名日更新但憐吾道在寧顧謫官頻故國拋天外全家寄水濵堂空巢少燕門冷謁無人直氣終干斗剛腸肯泣麟逍遙輕嗣立乾沒笑安仁愛主長思闕尋幽且養神伴間初種竹出使舊埋輪舌終期斷民冤必為伸他年修史傳誰可繼清塵題石壁山紹上人觀風亭界江千萬山石壁惟清幽中有忘機人超然樂巖丘創亭號觀風嘉景自成收群峯呈𣆶碧長溪瀉寒流視聽足怡情萬事安能求嘗言徂暑天登時疑清秋雲容既冷淡松韻還颼飀擾擾九衢塵誰知高靜游
