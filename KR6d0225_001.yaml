body:
  text: 宋孤山沙門智圓著首楞嚴經疏序夫覺理圓澄杳無能所真精湛寂詎有迷悟既而漚生巨海雲點太清晨朝覽鏡謂失頭而怖走瞖目生華睎結果而佇立於戲一念之妄心既動九界之幻境遽現生死如機以出入因果交織以起滅自墜塗炭真可憐憫蠢茲萬彚可勝言哉我大聖尊住首楞嚴能建大義以慈善力見如斯事於是乎無像而像龍飛乎義天無說而說言滿乎法界而像則八相成道而說則五時垂化故使厚殖者寂場開悟鈍根者鷲峯會歸事理既圓則出世本懷亦已暢矣然而尚顧殘機荐哀末葉或石多聞而左修證則流文字以忘返或譽實道而毀權法則傷甘露以早夭是故揚妙定辨常心重施偏小載扶戒律俾曉乎顯實不離於權乘證理要由於事行者矣楞嚴涅槃於是乎作也總兩經之具美成一化之極唱大矣哉首楞嚴經者其涅槃之前陣歟展矣阿難示婬室而遭攝於昭調御演祕密而往救惡呪既滅佛所爰歸適引多聞而自咎則三止之請斯彰乃陳發心而因相則七徵之說方起珠貫微言環連妙義使夫真妄兩分而一體事理二別而同歸盛矣美矣盖不可得而思議矣然而圓解既明圓行須著非夫解無以導其行非夫行無以證其理是故因華屋由門之求乃大明乎治行之要道也所以簡圓通以直示其修焉辨魔事以預明其發焉當根易悟既如此防萌杜漸又如彼足使夫慧日增暉邪網解紐忽然越於出世彈指超於無學者不在茲經歟圓生當像法世偶太寧舒卷斯文悲喜交集不揆淺識聊贊深經留贈後昆共期圓悟云四十二章經序古者能仁氏之王天竺也象無象象言無言言以復羣生之性由是佛教生焉教之高下視根之利鈍是故有頓焉有漸焉然後混而為一是謂開顯而群彚率其化復其性蹈乎大方安乎祕藏者可勝言哉逮于後漢其道東傳時君仰其神元元陶其訓乃與仲尼伯陽之為訓三焉原夫仲尼之為訓也揚唐虞三王之道尊仁而尚義俾復其王而企於帝者也伯陽之為訓也揚三皇朴略之道而絕聖棄智俾復其皇而企於結繩者也矧茲兩者談性命焉則未極於唯心乎言報應焉則未臻於三世乎雖然而於治天下安國家不可一日而無之矣美矣哉其為域中之教也明矣若夫釋氏之為訓也指虗空世界也悉我自心焉非止言其大極生兩儀玄牝為天地根而已矣考善惡報應也悉我自業焉非止言其上帝無常天網而已矣有以見儒道乎雖廣大悉備至於濟神明研至理者略指其趣耳大暢其妙者則存乎釋氏之訓與其為域外之教也又已明矣域內則治乎身矣謂之外教也域外則治於心矣謂之內教也昔阮孝緒正以內外之名為不誣矣是故代人謂三教混同焉或幾乎失矣或謂三教碩異焉亦未為得也何哉復性有淺深言事有遠邇則不得不異也至乎遷善而遠罪勝殘而去殺則不得不同也四十二章經者蓋吾佛滅後彼土聖賢輩於大小乘中撮其要言急於訓世者其章凡四十二焉集而錄之為此經也伊昔騰蘭至自梵國以其真化初傳華人或未之深信方且譯斯文以啟廸之也以為廣教之濫觴與圓不心服至道其有年矣甞慨此經首傳茲土而古無訓說後昆無得而聞焉不亦殆於忘本乎遂為之注敷暢厥旨庶幾乎揚吾佛之真風翼吾君之仁化俾黔黎躋壽域而履覺道也普入不思議法門經序昔我天中天龍飛虎變首出庶物恭默思道了然無得既而俯察群彚性與我一情將我異是故流生死而忘反著虗妄而不捨於是乎於無名相中作名相而說苟能復其性於名相乎何有哉譬若握空拳以誑誘於孺子也厥或呱呱之泣既止則開拳舒手豈有物耶噫十二部經八萬法藏者皆聖人握空拳以誑誘迷徒之孺子歟然則道無勝劣辭有險易若乃其辭簡易其義明白使若曹尋其言得其門而入不俟終日者有以見普入不思議法門經焉考經所列三昧門者其實二十八焉若觸類而長之則非數量之所及也美矣哉如來境界不由步而可到甚深法忍不待取而後獲者不在茲文耶此經乃大寶積第二十九卷也將欲啟迪來裔故錄而別行復依佛答阿難之問而以普入不思議法門命其題焉亦猶曇無讖抄法華普門品為觀世音經也恐來者不知故敘以明之是時聖宋三葉天禧四年龍集庚申夏四月既望越三日也文殊說般若經疏序夫真性元寂一法寧存妄心潛動萬境斯立於是乎苦樂升降堅乎取捨凡聖高下重乎去就方求出離反致顛墜是故或溺於凡或沈於小或滯於偏云云九界可勝言哉大聖人俯察而哀之將欲指彼妄心復乎真性爾乃演皆空說無住䖍劉群惑昭蘇大機二乘由是而有通泰心菩薩於斯而得不共法其閑邪存誠開物成務者何莫由斯道邪文殊說般若經者非其類邪矧能仁下問妙德上答辭語縝密旨趣簡易智日升而大夜曉慧劒揮而惑網裂正觀如來利益之功方著行惡境界不退之智彌彰慨茲法門弗傳叔世鄙雖不侫忝受圓乘龍樹一性之宗智者三觀之學淺得淵旨麤領精義遂依此雄宗釋茲奧典此經人法為名則能所如幻實際為體則生佛皆如觀照為宗則分別斯泯遣著為用則遣無所遣大乘為教則大亡大相託空而唯覺無得入海而但見一平誰云三世去來詎謂十界高下等菩提於非行混諸佛於眾生於涅槃無求而涅槃速證於生死不捨而生死遠離類罔象之得珠匪春池之執礫凡乎其可革聖乎其可階是以一行三昧顯無修而修不思議界彰無得而得夫如是則不壞假名不說斷滅者也雖醉中視物實見乾坤之盡轉而夢裏濟川覺去聲省舟檝之元無非發行之要樞趣果之夷塗而何所以釋提桓因發願擁護能仁大覺現瑞印說上聖猶然而況於下凡乎雖派深析重未契於佛心庶談刀捫象或裨於真化云般若心經疏序夫至道無名非名無以詮其道真空無說非說無以識其空繇是名於無名說於無說既機分利鈍之別故教有詳略之殊譬諸各結筌蹄意在同獲魚兔若乃了說無說達名無名則二十萬頌之非多一十四行之非少然則圓音既演雅誥爰陳相彼此之異宜實本末而相攝彼則毛目委示此則綱領總陳是故廣之不為煩略之不為寡二涂相埒一味同歸至若蕩滌群疑開濟正理豈止見色空之不二抑亦知生佛以元同無首後可以迎隨豈心口所能思議杳然無朕寂爾絕相苦危不度而度菩提不得而得可謂反本之要道破迷之前陣焉敢率台崖教門龍樹宗趣輙成義疏用廣發揮庶貽厥孫諆俾虗室生白者矣無量義經疏序夫體非舒卷用有開合舒之則開一出多卷之則合多歸一舒卷不二一多互融覈其理則生佛無差考其事則聖凡有異大矣哉我佛之聖人歟無師獨悟生而知之也率道演教誠而明之也於是乎端拱寂光乃睠群彚垂形百億唱義五天對利根則寂場肇頓接鈍機則鹿園始漸方等會啟則褒貶之說風行般若道敷則融通之教電照既而圓機普熟佛懷斯暢故高會鷲蜂詳論化本演無量義則開一出多顯三乘根抵於無相說妙法華則合多歸一示萬境會同於真心兩經既演大事斯畢使夫罷商前進於寶所大車直至於道場者何莫由斯法歟嗟乎妙經雖久布於神州斯典且未傳於後裔圓不揆淺識輒贊深文庶乎鳥向須彌同為一色水歸瀛渤都失本名云爾
