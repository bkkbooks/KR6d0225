body:
  text: 間居編序宣德郎守大理寺丞監杭州清酒務吳遵路撰五彩相宣故火龍黼黻照其象八音迭唱故英莖濩武導其和足言以文亦猶是矣何則志有所之而辭生焉辭不可陋而文形焉然而風流下衰靡弊忘返於是文過其實理不勝辭或貽鞶帨之譏或興鄭衛之諭比物連類猶或失之索隱釣深將何所取質而不野文而不華敷演真宗闢聖人之戶牖導揚名教示來者之楷摸則於圓公上人之文而見之矣上人世姓徐氏名智圓字無外自號中庸子錢唐人也年八歲受具於本郡龍興寺二十一歲傳天台三觀於源清法師上人神宇清明道韻凝粹德貫幽顯學該內外開卷遊目必沿波而討源屬筆綴辭率勸善而懲惡蔑聞可擇之行不觀非聖之書克己為仁無亡於終食服膺講道靡舍於寸陰仰止高山溫其如玉至性樂善蓋稟於天姿妙歲能文匪由於師授尤好靜默專務隱居屏去塵遊杜絶人事處方丈之室晏如覆杆玩一卷之書嗒然隱几陶陶乎不知物我之為異也道風所偃學者如歸巾卷盈門緇黃匝序暫聆更僕之論頓釋疑聞克終函文之儀皆成法器鐘鳴善應谷答忘疲斯又利物之勝緣誨之人能事也若義其耽味寶乘揣摩祕典演一音之遺旨四蹄之真詮揭慧日以揚光發揮大事引慈雲而布潤覆露羣方垂裕筌蹄動盈籤軸旁涉莊老兼通儒墨至於論撰多所憲章吟詠情靈悠揚風雅小文短札初不經心遺言放辭咸有奇致師早嬰痾瘵常居疲薾伏枕方榻罕事筆精授簡門人多出口占辭條錯綜文律鏗鏘率爾混成不煩刊定夫折理者意遠則理優宣理者理高則文勝蓋先本而後末托實遺華然後大羮不致而遺味存大圭不琢而天質露豈與夫咬哇之末響雕刻之繁文較其能否哉始自景德丙午迄於天禧辛酉集其所著得六十卷題曰間居編巵言日新方運不休之思賞音竊抃必期善聽之聰過此以還請俟來者其經論疏鈔科注等洎諸外學自成編録者凡一百七十卷皆從別行不列此集乾興壬戌正月序自序錢唐釋智圓字無外自號中庸子於講佛經外好讀周孔楊孟書往往學為古文以宗其道又愛吟五七言詩以樂其性情隨有所得皆以草稿投壞囊中未嘗寫一淨本兒童輩旋充脂燭之費故其逸者多矣今年夏養病於孤山下因令後學寫出所存者其後有所得亦欲隨而編之非求譽於當時抑亦從吾所好爾大宋大中祥符九年丙辰歲夏五月十日序間居編目次序宣德郎守大理寺丞監杭州清酒務吳遵路撰自序第一首楞嚴經疏序四十二章經序普入不思議法門經序文殊説般若經疏序般若心經疏序無量義經疏序第二佛遺教經疏瑞應經疏序觀普賢行法經疏序阿彌陀疏序第三涅槃玄義發源機要記序維摩經略疏垂裕記序第四觀經疏刊正記序般若心經疏詒謀鈔序金光明經玄義表微記序金光明經文句索隱記序第五請觀音經疏演義鈔序盂蘭盆經疏托華鈔序文殊説般若經疏折重鈔序首楞嚴經疏谷響鈔序第六涅槃百非鈔序涅槃經疏三德指歸序阿彌陀經西資鈔序金剛錍顯性録序第七觀音行門統攝衆行論思益十誡并序第八注刪定戒本序注觀心論後序智者大師十德禮贊序淨土贊并序南山大師贊後序新印還源觀後序第九書文殊般若經疏後序律鈔義苑後序詳勘金剛經印版後序第十法華玄記十不二門正義序翻經通紀序佛氏彚征別集序闡義鈔序第十一黃帝陰符經題辭病課集序第十二書智者大師後序書荊溪大師後序講堂擊蒙集序講堂條約序目録序帝年紀序廣皮日休法言後序第十三瑪瑙院界相榜序華亭興聖院界相榜序真覺院界相榜序瑪瑙院重結大界記法濟院結界記第十四漉囊贊并序漉囊志出生圖紀并序第十五錢唐律德梧公門人覆講記大宋高僧慈光闍梨塔記故梵天寺昭闍梨行業記僕夫泉記第十六三笑圖贊并序夜講亭述孤山述記夢對友人問第十七祭祖師文祭孤山神文又祭孤山神文撤土偶文中庸子自祭文第十八善惡有餘論周公撻伯禽論生死無好惡論福善禍淫論第十九中庸子傳上中下三篇第二十勉學上下并序第二十一與駱偃節判書與嘉禾玄法師書錢唐慈光院備法師行狀第二十二謝吳寺丞撰間居編序書第二十三謝府主王給事見訪書湖州德清覺華寺淨土懺院記第二十四答李秀才書與門人書第二十五辨錢唐名評錢唐郡文疑程候辨荀卿子好山水辨議秦王役鬼第二十六録兼明書誤讓李習之讀中説雪劉禹錫第二十七感義犬評謝屐敘繼齊師字擇日説敘傳神第二十八駮嗣禹説師韓議道德仁藝解第二十九送庶幾序錢唐聞聰師詩集序照湖聯句詩序送智仁歸越序第三十誡惡勸善錢唐律德梧公講堂題名序第三十一錢唐孤山智果院結大界序天台國清寺重結大界序錢唐法慧院結大界記第三十二代元上人上錢唐王給事書送天台長吉序命湖光感物賦分居賦陋室銘并序第三十三故錢唐白蓮社主文有序辨宋人中人針并序松江重祐師和李白姑熟十詠詩序遠上人湖居詩序第三十四錢唐兜率院界相榜序遺囑病夫傳病賦并序講堂銘窗蟲銘第三十五四諦具惑釋義頌依婆沙釋第十六心屬修道義淨名經釋見見義注天台涅槃疏主頂法師讚自恣文南山大師忌智者大師忌第三十六自恣念誦回向結大戒相回向歲旦禮佛回向冬朝禮佛回向月旦念誦回向祈雨回向祈晴回向結夏念誦回向晚參疏意佛涅槃意第三十七擬洛下分題并序松石琴薦茯苓人遞詩筒文石酒杯挑燈杖刮字刀試金石燭蛾誡挽歌詞三首中庸子預自銘之曰墓志瑪腦坡四詠并序第三十八送惟鳳師歸四明試筆讀史雪西施思君子歌海上五山歌陋巷歌贈友生慎交歌古琴詩第三十九吳山廟詩讀韓文詩山居招友人詩貽葉秀才詩贈簡上人詩述韓柳詩孤山詩二首暮秋書齋述懷寄守能師贈詩僧保暹師贈趙璞第四十經武康小山法瑤師舊居西施篇寓興山中自敘莫言春日長講堂書事勉隱者鑑山中行送僧答行簡上人書夏日薰風亭作初晴登疊翠亭偶成李秀才以山齋早起詩見贈因次韻和酬對雪孤山詩三首酷熱有客酬仁上人望湖山見寄次韻和辨才訪仲微上人不遇次韻酬明上人寄同志和聰上人悼梵天闍梨孤山間居次韻酬會稽仁姪見寄第四十一贈進士葉授夏日寄諒律師寄遠寄文照大師贈辨才大師孤山間居即事寄己師次韻酬聞聰上人春日書懷見寄春日間居即事寄元敏上人登樓感事寄天台友人書通上人城居湖居即事寄仁姪懷石壁舊居兼簡紹上人贈林逋處士梵天寺二首趙萬宗入道因寄春日湖居書事寄子璿師酬正言上人贈清義律師遊開化寺次韻酬子文師南塔寺上方寄贈子正律師憶南塔上方因寄慶昭師庭松寄曦照上人第四十二自針七針并序口針身針心針足針手針眼針耳針寄題梵天聖杲二寺兼簡昭梧二上人并序湖西雜感詩并序第四十三寄華亭虗己師旅舍言懷上錢唐太守薛大諫贈守能師潮贈夤上人歸道場山宿山院贈簡上人苔寄楚南師江亭晚望登武林高峯懷子仁師二首寄棲白師贈郝逸人遊靈隱山謝擇梧律師惠竹杖梵天寺間居書事鍊丹井冷泉亭贈僧湖居秋日病起六韻贈夷中師寄圓長老同友人宿山院贈清曉師寄德聰師上方院登樓懷遵易第四十四贈詩僧保暹師寄石城行光長老寄仁姪山行秋日感事湖上晚望寄友人贈聞聰師送僧歸饒陽悼廣鈞師次韻酬鄰僧畫上人旅中別趙璞旅中即事寄友生秋晚客舍寄故山友僧寄輦下譯經正覺大師寄潤姪法師贈白蓮社主圓淨大師春晚言懷寄聰上人留題因師院石楠花寄省悟師留題聞氏林亭小山寄仲孫上人房題聰上人林亭書久上人城中幽齋江上作懷保暹師贈宣密大師不出院懷中姪宿道場山寺送遇貞師歸四明山秋夕寄友僧第四十五陳宮春日別同志夏日湖上寄太白長老西湖送禪者古意雲苔錢三首自遣三首送僧庭竹雞送僧之金陵出道場山途中作將之霅溪寄別擇梧師寄淨慈寺悟真師次韻酬梵天闍黎溪居即事寄梵天闍黎武康溪居即事寄寶印大師四首瑪瑙院居戲題三首豫近卜居孤山之下友人元敏以四絶見嘲遂依韻和酬庭鶴寄天台守能上人寄所知題石壁山紹上人觀風亭第四十六昭君辭老將邊將二首貪泉夷齊廟嚴光臺間田讀王通中説讀毛詩讀孫郃集讀禪月集觀劒客圖詩魔謝僧惠蒲招元羽律師貧居酬簡上人見寄送僧歸姑蘇寄遠謝仁上之惠茶讀項羽傳二首草堂秋夜書荊溪禪師傳後二首寄題章安禪師塔寄天台能上人讀秦始本紀讀楊子法言書慈光塔苦熱古鑑寄題終南道宣律師塔嘲寫真冬日作誡後學螢舟歸詠鴈舟歸檻猿放猿湖上望月二首詠亡有禪師山齋養獼猴贈廣上人正月晦日作讀羅隱詩集落花織婦柳牡丹鴈浙江晚望第四十七寄雪竇長老君復處士栖大師夙有玩月泛湖之約豫以臥病致爽前期因為此章聊以道意寄西山智道人寄慧雲大師寄海慧大師洞霄宮久病山堂落成招林處士九月望夜招處士林君泛湖玩月病起賦得送人自關下還吳贈駱偃病中雨夜懷同志遊風水洞僧院白髮夜懷張逸人贈頭陀僧懷石壁山寺與友人夜話漢武帝送進士萬知古寄隱者贈誦經僧寄梵天上方政姪久病有感因示後學山中聞知己及第寄江上僧送人歸舊隱砌下老梅寄余秀才經通慧僧録影堂深居書事將入石壁山作瑪瑙坡即事自嘲草堂書懷中秋待月值雨少年行偶成失鶴送中姪書山中道士壁山居偶成第四十八古詩湖上秋日喻賣松者秋病偶作松風古劒自勉鼓銘病起自敘獨遊言志病中玩月潛夫詠松下自遣哭葉授讀白樂天集孤山種桃寄林逋處士早秋心交如美玉古人與今人代書寄奉蟾上人第四十九湖居感傷五十四韻讀清塞集寄趙璞山中與友人夜話間居書事禹廟早行江上聞苗詠燕讀杜牧集寄題聰上人房庭竹武肅廟寄蜀川王道士寄道士寄定海許少府寄若訥上人山中尋羽客不遇送人南遊懷同志聞蛩湖上間坐池上草堂即事讀楞嚴經病中懷石壁行紹上人謝可孜上人惠楞嚴般若二經并治脾藥第五十懷南遊道友裁花病起二首寄題虎丘山漁父水白蓮暮秋養疾君不來扇新栽小松間詠新裁竹讀元結文戲題夜合樹病中感體元上人見訪寄瑞應經疏及注陰符經與體元上人病起自嘲戲題四絶句并序鶴自矜鹿讓鶴犬爭功雞怨言第五十一經松江陸龜蒙舊居經照湖方干舊居玩月憶龍山院兼簡蟾上人間居示友人孤山間居次韻酬辨才大師山中感友生見訪舟次遊乾元寺風雨草寄湛上人秋夕題湖上僧房送悅上人歸仙巖聽琴寄咸潤上人寄葛溪爽上人題靜慮院寄吳黔山人懷友人聞蟬書友人壁哭辨端上人遊石壁寺書林處士壁幽居寄湖西逸人贈上人送希中遊霅鷺𪆗遠山間居編目次終
