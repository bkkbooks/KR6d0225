body:
  text: 宋孤山沙門智圓著送惟鳳師歸四明未識鳳師面早熟鳳師名毓靈本岷峩弱冠遊神京出處忌非類交結皆名卿高談駭眾聽雅唱歸羣英曩歲來淛陽相逢水心享樂天水心亭今水心寺是也論懷道且同對坐眼彌青尋幽泛輕舟待月步閑庭翌日倐分擕南北各如萍我尋住孤山師亦往東明人間一為別天上七周星江湖既相望煦沫安足評今年春之暮草堂花飄零睡起乍憑欄竹外聞人聲忽報鳳師至屣履出相迎借問胡為來告我以其誠度支司外計轉輸方度支也夕拜臨茲城太守王給事也二賢俱我舊故得尋其盟夏來西湖西為隣樂幽貞朝登隱君堂林公逋也暮叩中庸扃予之自號也引望雲山遙銷暑竹風清論詩貴無邪體道極無形倐忽時節移秋風拂簷楹趨裝俄告別鄞江指歸程適來既無事適去豈關情孤帆侵曉飛歸櫓連宵鳴風波視世態水月悟浮榮仍知皐鶴性不為塵網縈試筆城市居無分山林住有緣語慙甘似薺道貴直如絃兀兀吟終日羸羸病過年靜招湖畔鶴閑泛雪中船散悶雖無酒怡情喜有禪鬢根霜任點心跡火休然冷淡將誰合消搖且自憐閑來牕下坐試筆偶成篇讀史我愛包胥哭一哭救楚國事君盡其忠垂名千世則我愛魯連笑一笑却秦軍折衝罇爼間流芳至今聞我愛伯夷仁揖讓持其身餓死首陽下恥事干戈君後世闚竊輩故非姬發倫內藏篡弒謀外躡武王塵伯夷若不去名教胡以伸後人非三賢細碎何足云哭歎祿位卑笑喜膏梁珍山林亦寒餓行怪非求仁留心寡兼濟所謀惟一身撫書想三賢清風千古振雪西施苑蠡無西施胡以破吳國吳王輕社稷為惑傾城色夫差強變弱勾踐雌成雄豈惟陶朱筞實賴西施容西施語復賢褒貶何昏蒙但說傾吳罪都忘霸越功思君子歌小人足諂媚君子無猜忌開口揄揚皆聖賢滿腹包藏盡仁義脩辭復古振淳風折檻觸鱗彰直氣善世既不伐遯世亦無悶自同流俗混光塵不與常人鬬分寸展矣斯人欲見之一夕輾轉九迴思終日躊躇無所遇颯颯西風木葉衰海上五山歌五山峩峩聳海心海波上下隨升沉羣仙同往訴天帝巨鼇十五受天制一一巨鼇戴一山一交三萬六千歲無何龍伯釣六鼇兩山從此溺波濤群仙播遷作遊客上帝憑恕誅龍伯因知快樂非長久三界元空何所有莫於蝸角鬬雄豪海上仙山尚摧朽陋巷歌贈友生噫顏子兮居陋巷身雖羸兮道彌壯商受兮有皇都位雖尊兮名獨夫朝恣瑤臺之樂兮暮遭黃鉞之誅是知不義之富貴如浮雲兮惟道德為性命之要樞海濵有士兮慕顏子心重朝聞兮輕夕死紛紛糠粧兮視雄豪凜凜冰霜兮潔行止蓽門寂寞何瑣瑣執卷忍飢終日坐楊雄免遭甄豐戮朱建終罹辟陽禍射群高墉會有時於君無可無不可慎交歌莫言青松青有時亦摧折莫言圓月明有時亦虧缺莫逆論心素刎頸定交結年髮未及衰交情已消歇俄因𥪰分寸忽爾成楚越愛之欲其生惡之欲其死識欲松枯及月虧請看陳餘與張耳古琴詩良工採蟬桐斵為綠綺琴一奏還淳風再奏和人心君子不暫去所貴禁奢淫後世惑鄭聲此道遂陸沈朱絲鼠潛齧金徽塵暗侵冷落橫閑牕棄置歲已深安得師襄彈重聞大古音
