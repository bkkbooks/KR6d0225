body:
  text: 宋孤山沙門智圓著吳山廟詩君子尚權變權變貴合道子胥薦專諸子光專非好父讎共戴天乞師恨不早子光既得志入郢事征討報父既鞭尸諫王仍殺身孝子節方全忠臣道且新馳名天地間豈是悠悠人青史書盛烈血食旌遺塵廟堂耀晨曦廟木荂陽春往來無知俗焚香勤禱祝忠孝不敢行神兮寧降福讀韓文詩女媧鍊五石能補青天缺共工觸不周能令地維絶楊孟既云沒儒風幾殘滅妖辭惑常聽淫文蠧正說南朝尚徐庾唐興重盧駱雕篆鬬呈巧仁義咸遺落王霸道不明煙花心所託文不可終否天生韓吏部叱僞俾歸真鞭今使復古異端維既絶儒宗缺皆補高文七百篇炳若日月懸力扶姬孔道手持文章權來者知尊儒孰不由茲焉我生好古風服讀長灑蒙何必唐一經文道方可崇山居招友人詩結宇平湖濵放意且間逸陵峯時採藥服餌蠲故疾藜藿可供餐茆茨可容膝浮生貴適性何須羡奢佚清景況在目萬事安能恤水天爭冷落林巒共盤有時泛舟歸間門曬殘日徑荒人跡絶庭靜精怪出春羮漾紫蓴冬盤列黃橘坎井亦已樂尺蠖誰云屈外境莫我惑貞心長抱一涅槃終極典虗堂每談述不顧知者希庶欲已無失齊物鄙莊周見性師妙吉修然混生佛湛爾無虗實知音來不來時時掃幽室貽葉秀才詩松柏異衆木歲寒陵嚴霜蘭茝異衆草林深發幽香須知君子道不為窮困傷須知君子言唯為仁義彰夫君真儒者言行何優長文宗軻兼雄志嫉墨與楊攘袂叱浮僞百感生剛腸峩冠事禮容羣小畏矜莊去年遊霅溪相逢秋氣涼傾蓋既如舊寄宿林間房開懷黜二霸議道歸三王月席屢更僕風軒時飄霜相遇分既洽相別情彌傷今年住孤山夫君又來杭泛舟頻相尋道舊皆夕陽君惟儒家流才術況汪洋終期正禮樂勿事和塵光青雲即奮飛庶見儒風揚贈簡上人詩常人隱林泉反為名利縈志士處闤闠杳有江湖情有客務高潔禪房閉重城間門無俗跡壞壁饒蟲聲臥落春砌花吟盡霜蟾明道希君子知貧任時人輕秉操期不渝長保孤松貞述韓柳詩退之排釋氏子厚多能仁韓柳既道同好惡安得倫一斥一以贊俱令儒道伸柳州曹溪言釋還儒淳吏部讀墨子謂墨與儒鄰吾知墨兼愛此釋何疏親許墨則許釋明若仰穹旻去就亦已異其旨由來均後生學韓文於釋長狺狺未知韓子道先學韓子嗔忘本以競末今古空勞神孤山詩二首峭拔湖心起湖心四望通盤根入巨浸疊翠點寒空勢逈侔蓬島層危敵閬風僧樓籠淡霧鴈塔礙飛鴻曉井金沙粲金沙井在廣化寺晴坡瑪瑙紅山之西坡名瑪瑙噴雲春雨外照影夕波中野蔓垂枯柏廣化寺枯柏陳天嘉年植疏鐘匝梵宮環山梵剎五焉間泉澄極頂幽徑入深叢間泉幽徑在瑪瑙院古跡談皆異秋屏寫未同樂遊非俗客靜望屬漁翁買去知無價棲來思豈窮翻嗟市朝裏塵土日濛濛其二勢與羣峯絶崔嵬幾倦登波澄涵倒影雲盡露危稜景象全勝畫林泉半屬僧何人憑郡關西望翠層層暮秋書齊述懷寄守能師杜門無俗交塵事任浩浩空齊學佛外六經恣論討仁義志不移貧病誰相惱天命唯我樂百神非吾禱為文宗孔孟開談黜莊老諛諂音聲惡寂寥滋味好褰帷愁緒絶憑欄寒氣早鴈影沈遠空蟲鳴咽衰草伊余何為者力擬行正道願揚君子風澆浮一除掃贈詩僧保暹師天文懸日月地文麗山川人文粲六經四術詩其先仲尼既云刪炳然列風雅厥旨幽且微受之唯子夏邈矣千百年時有知詩者卓爾保暹師生于宋天下內明卜商道外減騷人價協韻鑿彼淳粹源清辭競流瀉放意尚幽遠立言忌妖蟲音野旨哉天目集四海爭傳寫上以裨王化下以正人倫驅邪俾歸正驅澆使還淳天未喪斯文清風千古振拹韻贈趙璞世態任悠悠正人無諂求古柏凌寒霜皓月當高秋心將周孔師日遠楊墨游涇濁與渭清由來自分流
