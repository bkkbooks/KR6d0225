body:
  text: 宋孤山沙門智圓著故錢唐白蓮社主文有序聖宋天禧四年春正月十二日白蓮社主圓淨大師常公歸寂于錢唐西湖昭慶本寺之上方草堂壽六十二臘四十四越二月三日弟子輩號咽奉全身瘞于靈隱山鳥巢禪師墳之右建塔以識之禮也其年冬門人之上首曰虗白者克荷師道自狀其事再欵吾廬請吾之辭傳師之美以勒豐且言先人之遺旨也吾辭不得命乃文而序之西聖之為教也清淨而無為仁慈而不殺抗辭幽說閎意眇指大備諸夏稟化之徒得其小者近者則遷善而遠惡得其大者遠者則歸元而復性噫廬山遠公其得乎大者遠者與考槃居貞修辭立誠識足以表微行足以作程是故時賢仰其高企其明自是有結社之事焉人到于今稱之而莫能嗣之惟公理行謹嚴修心貞素聞廬山之風而悅之且曰晞驥之馬亦驥之乘吾雖無似敢忘思齊之誡邪於是乎乃飾其躬乃刳其心乃矢結社之謀云夫率其道必依乎地尊其神必假乎像行其化必憑乎言以為西湖者天下之勝遊乃樂幽間而示嘉遁焉無量壽佛者羣生之仰止乃刻旃檀而為其形容焉華嚴淨行品者成聖之機要乃刺身血而書其章句焉其地既得其像既成其言既行朝賢高其誼海內藉其名繇是宰衡名卿伯牧長又聞公之風而悅之或尋幽而問道或覩相而知真或考經而得意三十餘年為莫逆之交預白蓮之侶者凡一百二十三人其化成也如此有以見西湖之社嗣於廬山者無慙德矣嘗試論之遠也上地之聖也公也初心之賢也實階位不同名聲異號然而遠出衰晉公生聖朝彼招者悉隱淪之賢此來者皆顯達之士絶長益短古今相埒不曰盛與美與公每顧門人曰國初以來薦紳先生宗古為文大率斆退之之為人以擠排釋氏為意故我假遠公之跡以結社事往往從我化而叢委頌稱道佛法以為歸嚮之盟辭適足以枳棘異涂墻塹吾教矣世不我知或以我為設奇沽譽者吾非斯人之徒也君子曰昔藥山惟儼能回李翱之心俾知佛而僧傳善之今茲衆賢庶幾實相欽崇大覺朝宗于性海共極于義天非公之力而誰與其護法之功代為不侔矣公諱省常字造微姓顏氏世為錢唐人七歲厭俗十七具戒若乃託胎之祥瑞受業之師保傳講習禪之美砥名礪節之事則有社客群賢序及門人所録行狀在焉此不復云直書其結社之道已其文曰西聖之大維遠得之廬山之高維公悅之西湖之社群賢慕之有始有卒不磷不緇我緣既終我滅于茲神遊無何名揚聖時欲知我道兮視此豐辨宋人宋人賣矛楯於市有買矛者曰此矛甚利所刺皆陷有買楯者曰此楯甚堅無能陷者或曰用子之矛刺子之楯如之何因而絶對知其說者雖婦人童子必能哂之吾覽韓子不哂於宋人也何則擡舁負販事事固然也吾謂代人之學者美己譽善皆宋人也以其未得少見曰我之道深於識矣未著一言我之道勇於才矣或語以子之識掩子之才可乎曰不我知也於是怨天尤人妄動求達奔走於天下以聘於知己於戲其可哂也由吾不哂於宋人故辨之中人針并序仲尼曰中人已上可以語上也中人已下不可以語上也又曰惟上智與下愚不移說者云上智不可使為惡下愚不可使強賢噫立言垂訓俾遷善而遠惡者惟中人可也於是作中人針少私寡欲無縱貪競戴仁抱義無失方正罔念作狂克念作聖學宜擇師友宜親仁行道揚名積惡滅身斯言有徵敢告中人松江重祐和李白姑熟十詠詩序松江重祐師學佛之外於風騷頗工嘗愛李謫仙姑熟十詠因賡而和之錢唐僧智圓字無外序曰夫詩之道本於三百篇也所以正君臣明父子辨得喪示邪正而已洎乎王者之迹熄而詩亡詩亡然後春秋作後世屈宋李蘇建安諸子南朝羣公降及李唐作者不一而辭彩屢變騁殊軌轍得之者雖變其辭而且無背於三百篇之道也失之者但務嘲詠風月寫狀山水拘忌聲律綺靡字句於三百篇之道無乃蕩盡哉故李百藥論詩而文中子不答唐朝李謫仙得之者也其為詩氣高而語淡志苦而情遠其辭與古彌異其道與古彌同則姑熟十詠復尤於衆篇矣而二百年來莫有繼和者今祐師之作情志語氣惟肖於謫仙則祐師之善詩其可知也圓嘗與祐師游見託為序故得直書以冠于篇龍集甲寅九日於錢唐西湖崇福寺講院序遠上人湖居詩序古者卜商受詩於仲尼明其道申其教而其序甚詳後世為詩者雖辭尚平淡意尚幽遠而子夏所序之道不可咈也繇是讚其辭知中心之哀樂焉國政之美惡焉故曰詩者志之所之也又曰主文而譎諫言之者無罪聞之者足以自戒噫詩之教大矣哉豈但拘四聲辟八病敘別離狀物色而已乎錢唐西湖崇遠上人好古博雅樂天知命栖遲山水間蓋有年矣於香火事佛外頗留意於吟詠雖顏齒已衰而情思彌壯一日見訪袖出湖居詩十章示於豫且以序為請豫三復之而皆敘間逸美太寧也於戲布於四方流于百世俾誦其辭者乃知賢者之心樂王者之化洽則上人之為詩庶乎子夏所敘之道也豈但馳騁於偶對拘忌於聲病耶若乃所得之尤者其句則有積水涵虗碧遙峯帶月秋香飄寒水遠燭映夜堂深幽鳥入深靄殘霞照晚流猿聲秋嶽逈月影夜潭空凡此數聯即所謂辭尚平淡意尚幽遠者豫不謹為序之以酬其請云天宋三葉大中祥符八年閏六月哉生明錢唐僧某序
