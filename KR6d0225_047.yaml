body:
  text: 宋孤山沙門智圓著寄雪竇長老絶頂久潛隱心間道更真山深林下雪堂靜晝無人雲抱看經石禽接入定身敢言他世約安養願相親師求淨土豫志頗同故云爾君復處士栖大師夙有玩月泛湖之約豫以臥病致爽前期因為此章聊以道意涼風吹衆木羸病轉加前伏枕誰相問中秋月又圓清光浮遠嶠冷色混平川不得同支許乘舟樂浩然寄西山智道人淨業修持久攀緣念已摧冰潭殘月在古岸夜禪回像燭微留焰爐香冷變灰時逢舊參侶間坐話黃梅寄慧雲大師繁華辭帝輦岑寂戀山林志向浮名淡房扃古寺深詩窗來皓月齊磬下幽禽終約逢新雪間過話靜心寄海慧大師雲門卜深隱誰復繼高蹤舊寺拋雙闕新題咏十峯大師有雲門十峯詠禪開杉徑月講候雪樓鐘莫怪相尋晚嵆康性本慵洞霄宮蕭灑絶塵跡虗廊畫列仙洞靈潛徹海山峭欲奔天松古巢高鶴庭間湧異泉長生如有術誰復歎流年久病五月茆堂臥窮秋疾未除喬林葉盡落舊識分皆疏講室縈蛛網書床長蠧魚醫王有妙藥飲了萬緣虗山堂落成招林處士搆廈當高巘登臨稱遁仙澄波寒浸郭疊翠冷搘天野艇浮殘照僧樓襯淡烟此中無俗物自可會清賢九月望夜招處士林君泛湖玩月病負中秋約殘秋月自新寒波沈皓魄碧落輾冰輪風靜砧聲絶烟收嶽影均何妨此夕玩況是不人病起秋盡積雨歇幽憂病漸安眼疼嫌字小身瘦覺衣寬倚杖防苔滑開爐怯夜寒浮生能幾日長作水漚觀賦得送人自闕下還吳蓴羮鱸膾美張翰忽思歸烟水東南闊風帆且夕飛靜吟新月正間望舊山微獨羡長江上遺名掩竹扉贈駱偃才高淹下位聖代尚遺賢賈誼方流涕楊雄正草玄開琴逢皓月試茗選清泉篋有文編在時容後學傳病中雨夜懷同志杉竹競霪霪天時正積陰背窗秋燭暗欹枕夜堂深月被重雲蔽螢依濕氣沉無憀不成寐況復想知音游風水洞僧院風水分雙洞幽奇類沃洲猿吟清徹夜山色冷宜秋雲擁階前石鐘殘竹畔樓賢哉白太守五馬舊曾遊白髮華髮如春卉森森易滿頭栽培全仗老澆灌半憑愁世態誰能避仙方莫漫求回觀短折者欲見更無由夜懷張逸人默坐懷幽趣誰知動陶窗虗殘月在天靜少微高書去言難盡眠來夢亦勞終期冒風雪乘興泛輕舠贈頭陀僧上行唯知足時人豈易同一身依樹下萬慮盡禪中乞食村飄雪降眠月墜空應悲浮世上煩惱事無窮懷石壁山寺梵宮藏積翠往歲屢遊遨月上寒溪靜雲收峭壁高幽階封藥草古樹宿猿猱終待携瓶錫間棲解鬱陶與友人夜話對坐當清夜茆堂野水西破窗秋燭冷高木老猿啼跡與孤雲並身將一夢齊幽懷言未已明月落前溪漢武帝酷矣秦皇滅荒哉漢武還將軍封五利神藥訪三山重色為金屋窮兵過玉關豈知堯舜道千古在人間送進士萬知古經明行修徒爾為一名屢點春官圍時之不利非戰罪歸山且著老萊衣清時貧賤誠堪恥侏儒太飽朔方飢男兒會有及親祿安能泉石久低眉束書依舊西入闕壯心潛與青雲期秋風嫋嫋孤魂斷古道迢迢去馬遲驥稱其德不稱力神駿唯應伯樂知寄隱者散髮空林下人間事不知風高蕙帳冷天遠鶴書遲瓶盡花朝酒扃殘寒夜碁無由訪幽趣蹤跡阻江湄贈誦經僧寂淡無餘念泠泠誦佛言清香飄靜夜明月泠間軒幽壑來精怪霜林息斷猿堪嗟浮世裏塵事𥪰暄喧寄梵天上方政姪一講更無事翛然自不羣間情江上月孤跡檻前雲徑冷秋苔合杉寒宿鳥分濤聲且暮近應向出禪聞久病有感因示後學羸病身未死輕安人屢亡穹旻不可問浮世轉加傷三十共嗟短百年同好長未能齊一夢何以事空王山中聞知己及第交知心莫逆出處任相違月裏方攀桂山中自採薇致君期有術遁世貴無機華髮他年事雲泉亦可歸寄江上僧江寺期終老清香講次焚月憐秋後見潮愛夜深聞古木青陰合殘雲靜片分相懷未能去來鴈又成群送人歸舊隱要地慵投刺剛腸恥折腰舊山歸興切殘日去程遙大野明殘燒空江響落潮到時雲樹下靜聽猒懸瓢砌下老梅傍砌根全露凝烟竹半遮臘深空冒雪春老始開花止渴功應少和羮味亦嘉行人憐怪狀上漢採為槎寄余秀才去秋曾訪我一別又經年落日無來信西風滿耳蟬頭應添素髮詩合有新編未可輕丹桂蹉𧿶老海邊經通慧僧録影堂寂爾歸真界人間化已成兩朝欽至業四海仰高名舊跡存花社遺編滿帝京徘徊想前事庭樹跪鴉鳴深居牢落誰知趣深居野興饒固窮期道在寡合鄙時澆徑靜苔長緑山寒雪未消殘陽荷輕䇿間望傍村橋書事年過不惑便衰殘消息浮生萬事間慙愧眼前無俗物舉頭終日見雲山將入石壁山作慧遠風流廬嶽隱支公高尚沃洲栖間思石壁堪長往擬躡浮雲上石梯瑪瑙坡即事瑪瑙坡前住清幽絶世緣湖澄秋夜月山碧晚晴天了性方成佛燒丹漫學仙會逢溫伯雪目擊道還全自嘲門徑任苔荒長年寢一床病中消白日詩裏發清狂窗暗雲遮月林明葉墜霜百年能幾日兩𩯭已蒼蒼草堂書懷浮華念久絶間臥愛茆堂門外滄洲闊間中白日長庭寒頻墜果爐暖忽飄香寂寂無他事誰知世路忙中秋待月值雨一歲期今夕高空雨忽零虗窗沈素影疏竹動秋聲已被雲陰閉徒懷永夜明徘徊倚山閣誰見此時情少年行兒奴屢背約辱我漢天子瞋目而語難五陵年少子舉手提三尺報國在一死匹馬立奇勳壯哉傳介子偶成世態如輪轉勞生豈定期否終還受泰樂極又生悲商代尊伊尹秦庭戮李斯未能知幻化安得證無為失鶴隻鶴忽飛去清音更不聞遠應尋鳳侶間恐避雞群岸靜休臨水庭空罷舞雲唯餘舊蹤跡篆字印苔紋送中姪四明乃舊隱岑寂宅神仙寒松糅紫霞幽巖落飛泉經秋動歸心荷䇿登江船澄波漾殘暉群峯插晴天窈窈空林下片石待安禪書山中道士壁松下消搖自扣扉相留終日話真機煙藏花島青牛臥客散仙房獨鶴歸丹井泉澄天影小玉壇風冷磬聲微乘間擬學冲霄術九土茫茫得者稀山居偶成世上誼譁耳不聞煙蘿深處絶人羣歲寒弗改憐高柏舒卷無機愛白雲間採藥苗醫故疾旋編紅葉寫新文有人來問居山意寂寂茆堂日又曛
