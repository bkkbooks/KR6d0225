body:
  text: 宋孤山沙門智圓著湖居感傷五十四韻迷真渺無始飄業産錢唐外族宗南郡門風祖偃王微緣先劫種宿習妙齡彰父母憐多病親賓怪異常布花模講道畫石斆題章戒印齓年佩心猿志學狂榮名虗準擬簪組妄思量禮樂師周孔虗無學老莊躁嫌成器晚心競寸陰忙翼翼修天爵孜孜恥面牆內藏儒志氣外假佛衣裳每惡銷金口時勞疾惡腸手中期得桂箭下待穿楊騃鹿方隨𦦨堅冰忽遇陽繫珠知在體甘露忝親嘗要道傳三觀真機得妙常不然心迹火任結鬢根霜覺路雙輪駕真空兩翅翔飢來還遇膳渴去已逢漿靜處如來室高眠解脫床理高山峭道大海汪洋力戰魔軍散功扶佛化昌空山憐寂寂塵路笑茫茫觸境知無著間居貴坐忘消搖希自了言説亦何妨撰疏松窗冷揮松古殿涼來蒙隨力化真誥應機揚達理雖云短尋文或有長圓伊令了悟法愛教消亡性任融凡聖修宜示否臧冥心潛應夢取驗敢垂祥事佛身多纍為師道實荒衡門連竹石草屋帶林塘冬服和絺綌中餐乏稻梁水邊雲作伴巖下柏為香景物看無猒幽棲興未央晚籬啼翡翠春沼浴鴛鴦菡萏花如畫嶔崟岫若糚飄窗松韻淡翻砌菊花黃放鶴時登嶺觀魚或在梁豈愁身病害長喜世平康無處求煩惱隨時任寂光昏衢懸慧日苦海泛慈航誓坐菩提樹高躋寂滅場冥真周法界垂應遍諸方頓漸門皆邃偏圓藥盡良驚迷辨雷震摧惑法輪疆鷲嶺先開會金河後祕藏留形歸後德遺法益無疆四等心彌廣三慈化甚詳道齊諸妙覺事類釋迦皇生滅非吾土圓澄是故鄉一空長寂寂萬類本惶惶庶了無生旨無生更可傷讀清塞集立意造平淡冥搜出衆情何人知所得後世謾傳名雲樹飢猿斷冰潭片月傾如無子期聽緑綺為誰鳴寄趙璞故鄉勾踐國解印挂帆歸吟苦容雖瘦官清道自肥堂幽山屐在厨冷甑塵飛莫向雲門下高歌便採薇山中與友人夜話草舍間宵坐消搖事可評澄心防有著深隱貴無名砌月移松影風泉混磬聲共期吾道在萬事任營營間居書事淡然忘外事林下自怡情室冷秋苔色軒間夜月明眠雲慙道薄餌藥覺身輕擬學鴟夷子時時變姓名禹廟洪水不為害黎元受賜多道尊由揖讓功大匪干戈任上諸侯貢貽謀五子歌稽山千古在宮闕倚嵳峩早行杖錫無同侶衝霜獨自行斷橋殘月在孤店曉雞鳴灌木樓禽散荒原宿霧平回觀遠山色已覺太陽明江上聞笛夜久聞橫笛寥寥景更賖天容垂極岸月色冷平沙靜引鄉心遠間驚旅鬢華哀音殊未已何處落梅花詠燕來去知時候堪憐異衆禽雙飛春雨細對語畫堂深寄宿雕梁穩銜泥柳岸陰捿身自有處鷹集莫相侵讀杜牧集讒當面唾輕生不得殳去邪空有志嫉惡奈無徒後世名垂遠當時道亦孤荒齋獨懷感殘日照庭蕪寄題聰上人房庭竹結根依靜砌蕭灑映禪房高節欺群木青陰過短墻夜聲喧夢枕秋露滴琴床遙想添吟思間觀到夕陽武肅廟土德衰微後忠誠道不群誓功陳帶礪霸業擬桓文妙略姧雄懾英聲四海聞山旁遺廟在牢落閉深雲寄蜀川王道士鶴賀幾遲留岷峩水石幽御風同列子夢蝶擬莊周醉臥空林月狂歌古觀秋何時歸閬苑間共老仙遊寄道士長聞披鶴氅城市往來頻得道人難測和光迹易親堂間秋搗藥壇冷夜朝真幾憶蓬壺頂蟠桃爛漫春寄定海許少府見説梅仙邑波濤接杳冥訟庭秋蘚合吟閣海雲醒愛月宵留客尋僧晝掩扃公餘幽興在時夢故山青寄若訥上人江濵方話別倏忽十年餘感舊空闕夢間眠懶寄書砌涼鳴蟋蟀潭冷照蟾蜍北望滄波闊無由訪所居山中尋羽客不遇杖黎尋隱迹重疊過林泉花暖幽禽語堂空瑞獸眠澗松寒有韻茶竈冷無煙知在何峯頂高談會列仙送人南遊難阻南遊興酣歌出故林路分滄海闊山疊瘴雲深馬援寧在重華廟可尋他年却歸此間話學夷音懷同志孤吟成白首十載別同聲海國書難到空堂夢易成淳風心共樂直道世多輕未卜重相見波濤萬里程聞蛩沉沉向秋暮切切聲相續夜靜草堂深間牀照孤燭湖上間坐終日湖亭坐悠悠萬慮間眼前何所有寒水與秋山池上漚生復漚滅水濕元無異盡日倚欄看無人知此意草堂即事經歲人不到騰騰養疏拙心期物外間緣向漚中絶入室容清風升堂許明月空庭何所有冷落唯松雪讀楞嚴經案上楞嚴典時看浣病愁階間移短影窗冷值高秋眼病花無果心狂照失頭指空期識月認指更悠悠病中懷石壁行紹上人石壁春歸去孤山秋未來夜深扶病坐明月照蒼苔謝可孜上人惠楞嚴般若二經并治脾藥經妙蕩煩惑藥靈醫病身道明無去住方驗有君臣靜玩知心寂時餐覺氣均徘徊感知己於我分彌親
