body:
  text: 宋孤山沙門智圓著請觀音經疏演義鈔序圓嘗讀此疏三復乎文鉤深乎理沉研乎行極思乎教有以見其辭簡而文其理微而遠其行惟覺意其教惟方等窮舍離受賜之旨盡聖主來穌之由一經大義如指諸掌蓋疏之蘊也得不謂開悟之樞鍵入道之徑術乎自陳隋洎皇朝越四百齡其間闡教立言之士代不乏之而講習此經者或寡矣贊述斯疏者無聞焉遂使深文奧義幾墜于地可太息也圓於是不揣檮昧輒事筆削經有未分之文疏有闕釋之義並皆區以別矣引而伸之俾疏義之無壅也因號所著為演義鈔固不能發揮中極所冀啓迪童蒙耳有所未知以俟來哲同見同行知我志焉時皇宋三葉登封之明年歲次己酉孟夏哉生明序盂蘭盆經疏托華鈔序夫記鈔之失其有二焉或失於煩或失於略煩則瀆於義略則壅於文既瀆且壅則後學之曹無所措手足矣去斯二者得乎中庸為難能也斯疏鈔者本傳與法師所撰雖流通已久實煩略未馴由是不揆荒蕪輒事筆削或播遷其文或彌縫其闕別成兩卷傳諸童蒙其間頗有改作而不忘其本故但以托華為名蓋言於舊鈔采托英華以為文體爾雖庶乎中庸之義而才識不敏短於自見所冀後之病今亦猶今之視昔云時皇宋三葉聖駕祀汾陰之明年歲次壬子二月十一日文殊説般若經疏析重鈔序般若真誥辭淳理幽雖上智猶病其難解也厥或疏以申之記以翼之則中下之流或得其門而入矣譬夫物有至重者雖烏獲猶患力之不足焉苟分而折之令其輕也則孺子亦云克荷矣始吾也既為經作疏焉今吾也又為疏作記焉蓋分析令輕之謂也使中下之曹亦能見其旨歟故大論云析重令輕種種譬喻令易解故噫若乃猶云不能荷負者則吾未如之何也已矣是時聖宋天禧四年夏六月六日於瑪瑙坡草堂序首楞嚴經疏谷響鈔序谷響鈔者況言説之本空也一名指月鈔喻藉言以詮理也初中庸子約三觀之道撰疏以解其經其次慮童蒙未曉其言又作鈔以伸其疏又其次懼來者執言以起惑封文以忘理方驅馳於虗妄之途出入於死生之域故立二名以警之庶知鈔之言如谷響也則疏乎經乎亦谷響也知鈔之言如標月之指也則疏乎經乎亦標月之指也若曹觀其名則於斯經也思過半矣鈔文一卷止盡玄義餘則未暇也聖宋天禧四年庚申仲春二十有七日於瑪瑙坡錦繡亭序越明年春續之成五卷
