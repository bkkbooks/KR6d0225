body:
  text: 宋孤山沙門智圓著代元上人上錢唐王給事書沙門某謹齋莊熏沐撰書致于知府給事執事某嘗謂大君子之用心也樂其善焉不止於一教取其人焉不止於一方而務在激勸於將來垂警於當世張其化本俾民由正道則豈獨主於儒乎定繫於此方乎美哉西方聖人之教其為善之大者稟教之徒其賢才貞諒亦衆矣是故湛然之達觀而梁翰林服之宗密之頴悟而裴相國仰之大顛之識理而韓吏部友之文暢之博聞而柳子厚多之斯四君子之知人四沙門之受知百世之下人無間然矣伏以執事淵識邁古偉名駭時負王佐之才實命世而出議者謂吾君將用執事陟巖廊謂鼎鼐故出是遵歷試之典也下車已來仁化既敷刑清政簡民知禮讓吏不忍欺而乃留意真宗以資浩氣是故浮圖氏有博極群經砥礪名節者往往得接光儀而謨謀名理焉雖靈運之精佛學裴寬之好釋典亦無以論之某錢唐人也幼解苦空理遂為釋迦徒而於法華華嚴之經百法因明之論學習誦授僅四十年又知治世立身無踰於儒典由是兼讀五經以裨佛學介特自任未嘗與庸庸者合雖貴有位苟不以道見許以禮見接亦未始阿意苟容附會形勢及聞執事之才之美勞謙接下使人器之遂慕高義得謁清塵果蒙執事不遺片善曲垂翦拂而生平蹤迹靄然有光面朋泛交由斯改觀噫不由受知於執事胡以臻此邪且執事之高明賢於梁裴韓柳遠矣而某畜縮比於然密顛暢猶塗漢之相遼萬焉今以畜縮之人受高明之知豈宜乎蓋執事將求草茆巖穴奇節逸群之士以輔翼明天子之化於堯舜之上所以顧小善而使致乎美名耳俾夫賢於某者必望風而進何哉且小善者尚蒙提獎況奇節逸羣之才乎沙門者猶辱見知況褒衣博帶之儒乎故曰大君子之用心也樂其善焉不止於一教取其人焉不止於一方也某不直敘感遇形于翰墨仍以所撰高僧韻對一十卷獻于客次雖無史筆之才而配耦事類次比聲律彰古人之盛烈以垂勸後昆亦已備矣伏望視事之外一賜光覽恕之罪之唯執事之命不宣某白送天台長吉序吾有幽憂之疾方且治之由是放浪於江湖間博覽景物以求自適而每愛夏雲之奇秋濤之壯左右睇而不知厭倦或曰子見夏雲秋濤必觀焉何謂也曰愛雲之奇也如斷崖疊嶂焉非以華彩而為奇也濤之壯也如振鷺飛雪焉非以其險溺而為壯也遂夫天之生人故有如夏雲秋濤者人之立言亦有如夏雲秋濤者且君子以端身履道為奇非素隱行怪也以勇仁敦義為壯非瞋目治難也及其言也以溫柔敦厚為奇非炳炳琅琅也以諷上伏下微有旨而為壯非狂懷訕時也吾所以觀夏雲之奇秋濤之壯焉思得其人而交之思得其辭而玩之曩者長吉師至自天台訪吾於孤山之下訊其人乃知其精浮圖書復善騷雅其為人其立言悉所謂如夏雲秋濤者於是得其人而交也得其辭而玩也是冬又至自臨安會于林下且言某舊識有杜申者淳儒也旅居會稽而有書招某某將往焉而且泛若耶登雲門遊法華以樂吾天真焉是役也冀贈以言以敘其行吾因諾之聞杜侯好古博雅清節不仕實海內之奇士也雲門法華亦天下之奇絶也名士招遊名山謀道樂性耳噫杜侯若不同吾以夏雲秋濤待上人者其何以臻此乎𦡱脙隱几輒口占成序假孺子以筆之為其貺焉天禧五年冬十一月二十九日於孤山草堂序命湖光錢唐西湖世傳有異光者久矣吾初不信及乎效支遁買山道猷招隱得孤山之西坡曰瑪瑙者凡三周歲星見之八九矣不知何神化邪有時大澤雨暗平湖月明是光也煌煌熒熒奪人目睛射室若激電奔野若流星或大則如輪如蓋或細則如杯如瓶降而復升滅以還明按劉道真錢唐記謂之金牛之光也劉道真錢唐記云明聖湖在縣南老父相傳湖中有金牛古嘗有見其映寶靈泉照耀流精神化莫測遂以明聖為名水居之俗山棲之民謂之災怪者有之謂之鬼火者有之吾實不知其實也既見於湖中命之湖光可也若乃照間僧之軒耀逸人之扃可以深居寓目兀坐陶情斯光也抑亦助吾之幽趣乎噫或見於名山靈嶽代之人必謂之神仙之光也浮圖之光也既謂之神仙矣浮圖矣必有宿齋而請見者再拜而潛禱者既見矣既禱矣往往有革凶頑而成仁信者捨浮競而樂清靜者非光之有用邪吁既見之不得其所但蒙世人以金牛災怪鬼火而計之爾於乎人亦有如湖光者感物賦架有名鷹兮翦六翮廄有駿馬兮絆四蹄望高空兮凝睇思廣陌兮長嘶妖孤狡兔兮正肥達路康莊兮坦夷利爪無施兮疾足何為楚文不放兮周穆不騎有奔電追風之能兮人莫我知嗚呼士有藏器於身兮有志無時吾於是感斯物兮歔欷貧居賦荒徑草深兮衡門長扃壞壁蟲響兮幽砌苔青饘粥糊口兮吟詠適情行披百氏兮坐擁六經困窮而通兮盤桓居貞嗟乎薄徒兮附勢尚聲奔走要路兮騎肥衣輕宴安華居兮狼心豕形豈思止足兮安戒滿盈名隨身沒兮禍逐貪生焉如忠士守仁義簞食瓢飲不改其樂兮垂萬世之令名哉陋室銘并序中庸子居室既卑且陋竊睹夫俗之華靡使健羡之心聿生貪暴之心得入仁義道德日可喪滅矣在中人得不慎乎乃作陋室銘以自戒其文曰維聖唐堯土階茆茨維聖大禹官室云卑其道明明其德巍巍維賢顏淵陋巷瓢簞維賢子思甕牗桑樞其樂不改其守不渝澆淫勃興淳朴乃隳綈繡土木上惑下隨雕峻墻宇淳源益漓爭奢斯起禮讓斯頽為殘為賊為瘡為痍奢夸禍基斯氓可悲吾之所居容膝有餘雲山吾友經典吾師困也德辨聖賢是則無萌侈心無附群匿戒云戒云出處語默
