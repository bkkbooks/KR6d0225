body:
  text: 宋孤山沙門智圓著自恣念誦回向某言循毗尼之雅誥遵調御之格言當炎風初入於樓臺咸稟護生之制及皓露方濡於草木同修自恣之儀況九旬淑慎以彌登三業策勤而靡曠莫不冰壺讓潔霜竹齊貞今則坐夏之限既圓遊方之心無阻於是集六和之衆先宣白二之言命五德之人次行對首之法殊無非相盡合真規有以見光釋子之行藏續佛法之壽命無涯景福謹進莊嚴恭願今上皇帝化洽無為威加有截蠻貃咸修於職貢黔黎共樂於升平壟畝有秋陰陽不忒次願梵宇清肅緇侶安康經律論之三宗敷揚罔輟聞思修之慧行肆習克勤勝事繼興嘉名更盛然後增八部神靈之德執十方檀信之恩凡百有情皆登覺路結大界相回向某謹言洪儒之治國也置公候則畫野分俾同遵於制度我佛之出世也立寺宇則隨處結界令咸稟於律儀是以為國者制度不可亡為伽藍者律儀不可廢雖禪居律寺之別擁毳橫經之殊既同奉法王敢輒違戒範如當寺也瀕湖勝槩負郭幽居息心達本之人時時戾止放鶴栽蓮之客比比來儀既提領而得人則墜典而咸舉由是遠邀碩匠準彼律科結大戒以爰周令憲章而不墜而今而後誰云於地弱不勝自東自西皆知於正法久住所生福善謹進祝延今上皇帝恭願天基永固寶歷長新秉鈞衡者則元愷術高治邑者則龔黃政美某等伏願禪枝長茂德嶽彌高然後宰執靈祇法界含識同承妙祉咸造真源歲旦禮佛回向某言夏正啓運堯曆紀元當萬物以發生在羣方而布令青陽併集鴻福唯臻蓂階虔祝於帝圖月殿式延於睿化恭願今上皇帝山呼獸舞皆康堯舜之期雲慶風祥盡屬禹湯之化次冀寺門清肅僧侶集和冬朝禮佛回向某言卿雲告瑞祕日初移群官列賀於明庭聖主端居於右介在釋子之虔祝仗佛事之貽休今上皇帝伏願處聖同堯承乾等漢四海之兵戈永息九陔之化道克施然後法輪不停慧光普照伽藍界內常布休祥月旦念誦回向上來念誦福善無疆今上皇帝恭願帝基可久聖歷延長箕風畢雨以順時佛日慧燈而永耀然後宰執伽藍常施陰德祈雨回向茲日親迓朝蓋俯降蕭宮然百和之名香祝千輪之妙相俾願繇繇大野祈微布於陰雲蕩蕩極虗冀廣施於甘雨然後使民田普洽年穀有成寅仰梵儀不盡精欵其次功霑品物利潤含生等沐良緣齊登覺道祈晴回向伏以炎雲霮䨴夏雨雱𩃰既農務以有傷肆郡候而軫慮伏乞慈風遐扇驅屏翳以潛蹤慧雲下臨引曦和而爰駕俾三農而無忒冀百穀以有成某等不任歸依禱告之至結夏念誦回向伏以畏日當空薰風育物稟我佛護生之制是沙門禁足之初由是月殿閎開雲徒畢集玉偈高吟於梵韻差肩行右繞之儀金爐輕裹於香雲對首作安居之法自此九旬進道三業修真庶期鴻福以無涯用助丕圖而可久恭願今上皇帝卜年卜世同覆載之長存乃聖乃神邁唐虞之至化知府運使諸廳朝貴共布袴襦之化即升台鼎之權次願寺宇昌隆僧徒輯穆迍憂不作檀施常臻土地真靈克施陰德晚參疏意右伏以罪福俱空照自心而可了生佛平等達本性以能通既理體以無差在助緣而豈礙於是歸依三寶敢虧精進之風懺悔十支庶復清淨之體洞義門而智慧開發入衆海而福德莊嚴盡此報齡同生淨剎轉化含識咸悟妙明然後恭願聖曆等乎仙椿黎元躋乎壽域仰金輪而彌固期玉燭以長和某等不任拜首歸命殞越之至佛涅槃意右伏以法無去來道非生滅且聖凡而一致在高下以誰分既而迷此真常縈乎纍縛故我佛大聖人垂妙應誘群機降生於微尼國中符瑞應於三界示滅於娑羅林內聲光駭於大千其種熟脫之緣過現未化蓋不可得而思議焉某幸賴宿因叨逢像法既偶還源之日是傾追遠之心由是率彼有緣營茲微供妙味雖非於香積至誠敢斆於純陀庶期上福君親下資動殖共食雪山之忍草咸明力士之額珠達自心源極佛境界某不任歸命殞越之至
