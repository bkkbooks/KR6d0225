body:
  text: 宋孤山沙門智圓著感義犬并序錢唐縣西北水行十八里有村曰義犬者昔人養犬甚馴行邁于是醉臥草間野火四至將焚焉犬能亟至河岸以身濡水濕其草主遂免禍睡覺犬力殫斃矣感其義因葬之鄉人命其地曰狗葬後刺史以義犬之名易狗葬之名予舟行過其地遂為文以感之浩浩動物唯人為貴立人之道曰仁與義二者不行與畜同類畜能行是與人曷異懿矣斯犬立功斯地救主免焚濡草以智其身雖斃其名不墜於戲人有畜心以形見親畜有人心以形見棄是非心焉形何辨旃犬形之人為善于是人形之犬孕惡不止傷哉凶人胡不遄死刺史贈名為教有旨評謝屐錢唐郡西有湖曰西湖湖中有山曰孤山山西有坡曰瑪瑙病夫居之二年創亭於坡之上亭自講堂之北由竹徑盤紆斗上平視崇山下瞰巨浸春容秋態布列目前其或晝雨收暮雲卷林巒爭翠花木競秀既若濃黛潑粉障又如華袞映瑠璃故病夫講暇憑欄流睇瓦然終日不知它營噫境惑於我邪我惑於境乎每至雨歇山水下流幽徑沮洳山石磥砢而且阻往來因思謝客兒肆意泉石尋山登嶺甞著木屐上則去其前齒下則去其後齒病夫依其製納以登降若由坦塗在危能安履險而夷吾考其由由損有餘而補不足也夫屐之上山也則前昂而後低去前齒者損有餘也留後齒者補不足也故上山所以安且平也屐之下山也則後舉而前屈去後齒者損有餘也留前齒者補不足也故下山所以安且平也是故在危能安履險而夷無他也損有餘補不足也噫持此道以履於家履於國履於天下則何患於傾危哉所以傾危者由減不足以奉有餘耳此猶不率謝公之製而納常人之屐乘陵陟岡者必有蹉跌顛墜之患矣吾詳靈運之用意託此以矯世垂誡也豈獨在於屜屐哉康樂公沒六百載于茲矣胡以問邪嗚呼敘繼齊師字恭名稱字仰聞之儒禮也覽天竺古皇之教乃見子兼父母之名知其不以避名為禮矣又彼聖賢輩或云字而不言名或云名而不言字者蓋名之與字同出而異稱爾非定體彰德之別也矧夫圓頂既殊於章甫方袍且異於縫掖必立字以倣儒耶然雖推本無聞而隨方有義故中國古之桑門清簡貞固角立傑出者皆名字雙立焉吾友繼齊師永嘉人也貌莊而氣清志高而辭正曩者學止觀法門於奉先而與予同門習淨名大義於石壁而與予同道是以熟其行知其德故得詳其名稽其實而字之書曰底至齊信用昭明于天下孔子傳曰致行至中信之道用顯明于天下雅曰殷齊中也考彼二文齊訓中也明矣是知吾友以繼續大中之道以立名豈徒然也夫大中之道非聖人莫能至之非君子莫能庶幾行之書曰建用皇極語曰中庸之德其至矣乎抑又古先覺王升中天降中國中日生證中理談中教噫釋之尚中既如此儒之尚中又如彼中之為義大矣哉吾友志慕真宗旁通儒術希中為字不亦宜乎俾解希乎中無空有之滯行希乎中無偏邪之失事希乎中無狂狷之咎言希乎中無訐之弊四者備矣修之於身則真淨之境不遠而復化之於人則聖人之教不令而行夫如是則稱其字而思過半矣彰德之義於斯見矣擇日說陰陽家流謂日之吉凶由善惡之神主焉蓋佐天而為治者也故犯凶日必罹之禍擇吉日必貽之福而民惑久矣凡改作用事咸擇其吉日冀去禍而就福焉吾不信也夫吉凶禍福繫乎人不繫乎日書曰惟上帝無常為善降之百祥為不善降之百殃果有神佐天為治者也必能罰罪而賞功也苟凶日為善豈速其禍邪吉日為惡豈蒙其福邪為善而速禍是罰不當罪也為惡而蒙福是賞不當功也既而賞無功罰無辜則神乃弄天之權妄作威福者以上帝之聰明必削地奪爵久矣豈至如是而猶司賞罰之柄乎薄俗棄忠孝而不履背禮義而不修而競擇吉日欲苟免其禍而諂求其福者何異惡醉而強酒乎王制曰假於鬼神時日卜筮以疑眾者殺說者云今時持喪葬築蓋嫁取卜數文書使民倍音背禮違制以其為害大也嗚呼吾聞積善之家必有餘慶不聞用吉日而致福也積不善之家必有餘殃不聞用凶日而致禍也故曰吉凶禍福繫於人不繫於日也故吾用事必擇道而行之擇禮而從之擇友而交之擇里而處之擇師而事之孳孳然砥名礪節俾無失於天爵也而擇日不與焉敘傳神釋氏子之廓才識者必內貫三學外瞻五明戒定慧之謂三學也聲醫工呪因之謂五明也明者曉解精識之謂乎寫貌傳神其工巧明之至者矣夫寫貌貴乎似既似矣必在得其精爽於筆墨間則神可傳矣與其本體之無異故世謂之寫真焉豈比夫潑墨以圖山水縱怪以狀鬼神率情任意無所規準耶諒工巧之狂誕爾故曰寫貌傳神其工巧明之至也惟久上人錢唐人也正業外以傳神擅名吳越間高僧巨儒悉上人筆其狀也雖止水照影明鑒寫像未之若也噫藝之精至有如此者因悟夫學吾仲尼之道者豈不然與仲尼得唐虞禹湯文武姬公之道炳炳然猶人之有形貌也仲尼既沒千百年間能嗣仲尼之道者唯孟軻荀卿楊子雲王仲淹韓退之柳子厚而已可謂寫其貌傳其神者矣其申商莊列朱翟之學者乃潑墨圖山水縱怪狀鬼神率情任意之說豈規準於周孔乎於戲肖其容得其神者傳寫之上也肖其容不得其神者次也不肖其容而姑為人狀者又其次也寫人貌而反作獸形者何足道哉李斯學周孔道由荀卿門洎乎相祖龍也火六經而坑儒士峻刑法以殘黔首使天下搔然卒滅秦嗣何異乎寫人狀為獸形耶因美上人之藝精筆妙故敘之亦足為學道者之誡云
