body:
  text: 宋孤山沙門智圓著昭君辭昭君停車淚暫止為把功名奏天子靜得胡塵唯妾身漢家文武合羞死老將畫堂升降子孫扶白髮𣯶𣯶膽尚粗不省時清身已老逢人猶説斬單于邊將二首威聲飛將豈能過號令雄師劒始磨雪攪長空馬殭立偷營今夜度膠河其一百戰依前勇氣成窮邊深入耀精兵穹廬燒盡龍庭破却上燕然更勒銘其二貪泉隱之曾飲肯為非今古泓澄照翠微自是貪夫性貪賄便將泉水作因依夷齊廟曾聞叩馬犯君顏萬古清風滿世間若使干戈為揖讓夷齊終不死空山嚴光臺撥亂方爭汗馬功賢才誰肯守窮空嚴光亦是夷齊類埀釣碧溪敦讓風間田虞芮懷慚觀禮讓間田從此草長生而今雖是文王化難遣貪夫兩不爭讀王通中説孟軻荀況與楊雄代異言殊道一同夫子文章天未喪又於隋世産王通讀毛詩夫子刪來三百章針規明白佐時王近來吟詠唯風月謗木詩官事久亡讀孫郃集唐祚將亡王澤枯四明歸隱泣窮塗而今若撰才名志更有間僧得入無郃撰四明才名志釋宗亮預焉讀禪月集屬興難忘水與山救時針戒出其間讀終翻恨吾生晚不得斯人一往還觀劒客圖飛劒縱橫乍可驚翻疑風俗妄傳聲如今至究在何處不出為人平不平詩魔禪心喧撓被詩魔月冷風清奈爾何一夜欲降降不得紛紛徒屬更來多謝僧惠蒲扇結蒲為扇狀何奇助我淳風世罕知林下靜搖來客笑竹牀茆屋恰相宜招元羽律師去年相訪宿吾廬露滴蒼苔夜話遲湖水晚來清不極今秋又是月圓時貧居山厨竈上苔痕碧齋盂生塵無粒食可憐鼠未知貧穿屋穿墉不暫息酬簡上人見寄林間病臥懶逢迎相識何人最愜情唯有簡公間且僻寂寥翻被俗流輕送僧歸姑蘇姑蘇臺畔樹含秋蟬噪西風雨乍收間笑間吟忽歸去月明何處宿孤舟寄遠洞房秋晚更思君寶瑟慵彈日又曛鴈過長空書不到滿庭黃葉落紛紛謝仁上人惠茶寄我山茶號雨前齋餘間試僕夫泉豫止山居有之睡魔遣得雖相感翻引詩魔來眼前讀項羽傳二首頻年戰勝恃雄強歷數分明在彼蒼堪笑范曾無異識不能令主事高皇其一發歎虞姬勢已窮烏江此夕喪英雄當時若也知天命佐漢應居第一功其二草堂秋夜雨殺炎光變秋色清涼頓在草堂中幽人一夜坐不睡月照間階露灑空書荊溪禪師傳後二首智者真宗談一性相傳六世至荊溪高揮彩筆示深趣來學無窮俱破迷其一清風遺句滿人間滅後天台迹更間折塔摧人不顧不堪冥目想空山其二寄題章安禪師塔祖師墳塔在天台雨壞風摧事可哀香火無人空有迹夜深明月照蒼苔寄天台能上人天台深隱許誰同擾擾浮世萬事空終約携瓶訪師去水邊松下嘯清風讀秦始本紀縱欲勞民殊未已阿房望夷相次起後來風俗昧其由妄説秦皇能役鬼讀楊子法言秦焚漢雜道何孤蕩蕩皇風豈易圖空有法言為世範不知來者肯行無書慈光塔靈骨未藏三十載我來收得葬孤山此中起塔不在大已有高名垂世間苦熱平湖日炙沸如煮庭樹色乾鳥渴死何人萬里驅征車紅塵漲天方入市古鑑土蝕菱花有微竅懸向秋堂光照耀寫出人人妍醜姿西施始免嫫母笑寄題終南道宣律師塔冷碧終南插太虗紵麻蘭若舊間居波離滅後無人繼蕭索西風葉滿渠嘲寫真泡幻吾身元是妄丹青汝影豈為真吾身汝影俱無實相伴茆堂作兩人冬日作凍撮間庭土皆裂風號門外人來絶可憐萬事不干身憑欄且看千峯雪誡後學對食須思稼穡勞為僧安用事雄豪剃頭本意求成佛不為齋筵坐位高螢微蟲稟質有清光蹤迹難令暗室藏車胤死來人墮學秋庭終夜恣飛翔舟歸詠鴈嗷嗷旅鴈滿寒塘間坐歸舟帶夕陽一一似能遵禮教等間驚起便成行舟歸平湖渺渺澄寒水孤舟靜泛清光裏却慙未是狎鷗人處處鳧鷖盡驚起檻猿異果供餐金鎖纏侯門雖貴性非便夜啼只憶巴江畔霜木千株冷倚天放猿放汝孤猿任自由萬山雲樹正含秋不知今夜啼明月又使何人淚暗流湖上望月二首秋水澄澄樹絶風冰輪苒苒上遙空間思今夜供吟景冷色清光幾處同其一寒光皎皎映平湖水色天形兩不殊學道未能同罔象也於深處見圓珠其二詠亡有禪師山齋養獼猴間庭樹樹果垂霜聽法猶憐入草堂異類豈能知禮節每來相對坐禪床贈廣上人魏闕林泉趣本同隨緣來往興何窮間宵訪我茆堂宿湖水無波月照空正月晦日作春晴殘日照平川老幼相擕古岸邊富貴在天誰肯信臨流爭放送窮舟讀羅隱詩集非非是是正人倫月夜花朝幾損神薄俗不知懲勸旨翻嫌羅隱一生嗔落花花開花落盡由風數日榮衰事不同庭下晚來猶可玩緑苔芳草綴殘紅織婦九月風高未授衣燈前軋軋夜鳴機困來不覺支睡鼠齧𮈔頭四散飛柳融融春色伴花榮濃翠參差雨乍晴低拂冷煙元亮宅靜籠明月亞夫營葉浮晚水愁眉細絮落春衣雪片輕莫上隋堤思往事萬株蕭索傍河聲牡丹栽培寧暇問耕桑紅白相鮮映畫堂淚濕濃粧含曉露火燔寒玉照斜陽黃金剩買心無猒綺席間觀興更狂誰向風前悟零落百年榮盛事非長鴈歲歲隨陽整羽翰翱翔還見過雲端哀音斷續霜風緊群影參差夜月殘雕鶚已逃榆塞險煙波初下洞庭寬行人萬里思歸切送目遙空寄信難浙江晚望景象依依滿目前倚笻間望思凄然隔雲清磬山傍寺照水孤燈渡口船蕩漭落潮平占岸參差歸鴈沒遙天錢王霸業今何在牢落荒城積野煙
