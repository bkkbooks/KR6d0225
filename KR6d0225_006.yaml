body:
  text: 宋孤山沙門智圓著涅槃百非鈔序金剛身品百非之文古來人師但解非身是身一句而已章安疏主雖以三諦分文亦不委消名相豈非佛旨淵深聖言祕妙既思議難及故諸德置而不論耶豫先撰三德指歸申明經疏至於此義亦乃闕如適因講次隨文粗釋諸來學者請形筆墨因是輒陳管見略為疏出竊慮加水之乳有誤後昆其有智者宜自詳擇時大宋大中祥符七年龍集甲寅九月二十七日於西湖崇福寺講院序涅槃經疏三德指歸序涅槃疏者實吾祖章安法師約龍樹宗旨用智者法門依經辨理大明乎三德之妙義也既而章安師沒荊溪師作筆削斯文再治再定抑又因舊章見新意如諸文之下或加私謂文句之題改之曰疏是也然後得盡善矣邇世空文僅存莫有傳者錢唐沙門釋智圓字無外其荊溪十世之法孫也痛微言之將墜憫後學之不聞於是撰記以申明之勒成二十卷號三德指歸凡於文高旨遠言約義微之處而皆離堅合異派深析重指而歸之俾夫來者識經之所詮疏之立義盡在於生佛無差一心三德之理也無奔走於迷途姑務於理觀講授矣惟懷道者知我志乎大宋大中祥符四年歲次辛亥八月既望於錢唐西湖崇福寺講堂首事筆削越六年癸丑九月二十六日於大慈山崇法寺方丈功畢序云阿彌陀經疏西資鈔序夫疏之有記鈔者蓋後學之曹記録要義抄寫格言以輔翼其疏防乎傳授之謬誤討尋之忽忘耳吾所撰十疏者乃始於文殊般若而終於阿彌陀經也雖皆乘興偶然而作及論其次第似有旨乎得非始以般若真空蕩擊著於前終依淨土行門求往生於後邪噫以無所得心而修佛國行者不亦宜乎抑又念涅槃有言騾之懷胎竹之結實人之抱疾斯三者諒必死之非久矣矧吾有深固之疾而困躓臞瘠亦已甚乎豈能久留於世邪遂亟欲口授其義旨于來學輩俾廣淨土之道也門弟子有願書吾言於紙以為記抄庶逃謬誤忽忘之咎焉吾乃許之遂隱几口占使門徒曰惟雅者筆之成一卷凡十餘紙吾自顧而笑曰我為經作疏已多言矣況又為疏作鈔邪雖然無名相中假名相說得夫魚兔者筌蹄也言可棄乎且使夫後昆傳無盡之燈益無窮之機使信釋迦之勸讚荷諸佛之護念入彌陀大願海中者可不由於斯文歟夫如是則斯言足可為吾西歸淨剎之資糧也可號之曰西資鈔焉小子識之門人曰唯唯既聞命矣作禮而出是時巨宋天禧五年倉龍辛酉冬十一月七日午後首事染毫翌日初夜分絶筆序云金剛錍顯性録序金剛錍者荊溪大師宗圓頓教所著論也發揮佛旨擬議圓宗融萬法於一心息異論於千古抑又開後昆之智眼喻金錍以立名敘前代之權疑寄野客而興問其道甚大嘉言孔彰俾佛性昭昭無為昏情所隱者其此論矣圓耽味沈玩有年數焉於是採托群言敷暢厥旨所期自照敢貽他人既録本宗要文顯此佛性妙義因命為顯性録也時皇宋景德三年歲次丙午中秋望日序
