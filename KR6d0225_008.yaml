body:
  text: 宋孤山沙門智圓著注刪定戒本序佛氏之立言訓世者三曰經曰律曰論原夫誘初學明製度其律藏為要乎洎乎部執叢起而四分之宗復為律藏之要矣若乃直舉綱條發號施令者則戒經之文又要於四分矣故制半月一誦之俾無犯者所以知競慎有犯者所以勿憚改噫戒經之要如是乎初耶舍誦梵本羅什譯為秦言至南山為之注解復嫌本文之過質又刪定焉自時誦習者咸舍舊而從新矣若然刪定又為戒經之要也沙門覺猷苦心律學遂遷澄照舊注以釋刪定新文披辭見意不俟終日俾至要之説利於來世猷有力焉以序為請者三載矣一日興來遂操觚直書以冠其文注觀心論後序昔草堂禪師嘗注賢首疏於起信文下此既古賢用意豫竊斆焉抑又斯疏多歷年所遺編蠧簡不無同異其或釋文前却三寫訛舛者必修定之改易之庶幾來裔尋文曉義不俟終日遵乎慈訓澄神內照無患力不足也知我者且不以斆嚬專輒之為誚乎時聖宋三葉天王有事於汾陰之歲歲在辛亥正月既望注畢序智者十德禮贊序禮記曰其先祖無美而稱之者是誣也有善而弗知不明也知而不傳不仁也此三者君子之所恥也噫在釋子豈不然耶吾祖智者行位昭明功德廣大愚忝傳其道為一十六世之法孫也每至諱日雖薦以蘋藻曾無頌詠不亦恥乎法華玄義之初章安稱師十事而云唯我智者具諸功德故智盛美盡在茲矣因列而為讚雖辭理無取幸逃知而弗傳之責爾時大宋大中祥符八年龍集乙卯閏六月吉日於西湖崇福寺講堂序淨土贊并序曰天理湛寂詎可以淨乎穢乎延乎促乎彼乎此乎而思量擬議者哉然而悟之則為聖為真為修德為合覺為還源為涅槃迷之則為凡為妄為性德為合塵為隨流為生死大矣哉聖人之先覺也憫其未覺焉於是乎土現清淨壽延無量端拱東向而慈眼無偏視俾我羣迷厭穢而欣淨惡此娑婆而取彼安養矣既而升寶剎覲法王目神變耳妙訓則湛寂之性不遠復矣達十方太虗悉我心現矧依空之土復何有哉噫如是證悟者孰不由其厭穢欣淨惡促好延捨此取彼之心而致乎而況達欣厭而無欣厭了好惡而無好惡知取捨而無取捨者耶是故釋迦現穢土而俾厭彌陀現淨土而俾欣其有旨哉吾慈母馬氏生厭穢境死欣淨剎壽七十有一而終寢疾之際以所造淨土無量壽像囑吾以供養承事焉十載于茲矣嗚呼母人之德其在免子於溺墜水火而已而吾母也始能捨吾為佛徒次能資吾以學法末又約吾以往生是能誨我於道也蓼莪之歎風樹之悲歲月其邁而吾心不衰遂齋莊馨爐染毫作淨土贊庶祐我母陟乎聖階覺海澄圓廣大無邊無促無延其一群𫎇失道自劫家寶生死浩浩其二大覺軫慈淨國爰居俾我來思其三金臺既升覩佛儀形悟我妙明其四像以相覩贊以道取福我慈母其五南山大師贊後序友人擇梧律主嘗以南山事迹見託為讚凡三數載矣既而多故莫遑染筆大中祥符七年青龍在甲寅仲秋五日於西湖崇福寺講涅槃經至純陀品偶有好事者持南山傳至余所居因覽之得其事類者八乃次而讚之號曰南山大師禮讚文但詞句野質而不足以歌詠盛德聊塞友人之請爾新印還源觀後序新印還源觀者蓋信士某率財所置也昔在有唐杜順大師內證法界之理外病衆生之迷於是扶華嚴深旨而撰斯文以為後昆入道之行門焉是故其辭簡而華其義玄而顯但多歷年所頗有舛誤世雖盛行罔或條理今所印者乃博求衆本精詳得失而播遷訛偽開濟正真亦已備矣俾黑白之衆無繕寫之勞手披真文心存至理達依正不二悟凡聖一如無修而修無證而證諸佛境界不遠而復其流通之益也如此與夫書山壁説田里者相去何若愚好聞善道能無述哉時大宋祥符三年二月十一日錢唐釋智圓序
