body:
  text: 宋孤山沙門智圓著贈進士葉授旅跡飄然與俗分動時高價逐新文寄眠僧舍扃秋雨牽夢家山隔海雲學慕丘軻方共語道歸楊墨任離群名場好應同人舉垂拱明堂有聖君夏日寄諒律師澄江杳杳映千峰坐夏巖房一望中晝講疏鐘清度越夜吟殘月冷垂空掃軒靜避階稜蘚銷暑間當竹罅風顧我相懷未能去水邊斜日照梧桐寄遠車聲日日碾紅埃何事良人獨未回苔鎖洞房書久絶月明深夜鴈空來寒侵竹葉難成醉塵暗菱花更懶開杳杳雲山不知處夕陽頻上最高臺寄文照大師兩制音書數往來城中棲隱遠塵埃吟齊夜靜開明月講石秋深掃緑苔出俗舊題留雪苑臥雲幽興夢天台林間抱疾懷高趣翻笑湯休謾有才贈辨才大師兩受皇恩萬慮休浙陽高臥謝諸侯定回幽室苔痕老講徹間庭樹影秋天竺雲泉時掛夢梁園風景懶重游溪聲柏子將誰說默倚禪床自點頭大師講外深於禪學孤山間居即事寄己師年過不惑𩯭成絲偶到林間便卜居學道未忘山水癖愛間終與利名疏夜涼危閣來明月風靜平湖漾碧虗回首權豪絶相識野雲孤鶴自相於次韻酬聞聰上人春日書懷見寄景色融融萬卉新潛知青帝又東巡陰崖竹樹猶欹雪暖砌鶯花已覺春吟苦漸驚華髮亂身間終忌俗流親寥寥此意將誰說回首禪門有故人春日間居即事寄元敏上人門掩平湖避俗囂靜觀風景識春朝庭梅向日花全拆嶽樹連雲雪未消少壯可驚年暗減幽棲翻覺睡偏饒相知賴有曹溪子禪外時來慰寂寥登樓感事寄天台友人間倚危欄思黯然浮生誰共歎流年愁催華髮生無極心許青山去有緣冷淡空江澄暮色參差歸鴈沒寒煙吟餘更羡林間客高臥深雲聽瀑泉書通上人城居禪房蕭灑閉重關祖意明來萬事間高臥有時消白日靜吟無念憶青山掃花晚砌留蒼蘚剃髮秋池照病顏堪笑林泉深隱者不知幽趣在人間湖居即事寄仁姪講退臨流獨倚笻塵埃無處寄間蹤青山歸去心長在白髮生來事轉慵門徑草深梅雨歇像龕燈暗水煙濃相知唯有搖松客時辱音書慰病容懷石壁舊居兼簡紹上人壁立岩巒照冽泉幾思幽景歎流年歸棲自合同仙跡深隱誰云有洞天修竹寒聲風乍動古潭秋影月初圓伊余亦擬依支遁枕石眠雲碧嶂前贈林逋處士深居猿鳥共忘機荀孟才華鶴氅衣滿砌落花春病起一湖明月夜漁歸風搖野水青蒲短雨過間園紫蕨肥塵土滿牀書萬卷玄纁何日到松扉梵天寺二首路上中峰勢屈盤塵埃蹤跡到終難秋杉影射經窗冷夜浪聲搖睡榻寒雲過間軒香篆潤日移幽砌蘚痕乾吟餘靜立憑欄久極目長江水渺漫其二梵宇清虗遠俗喧登臨時得爽吟魂卷簾高雪明稽嶺上閣秋濤出海門羣木冷陰連古塔疏鐘寒韻徹江村城中泉石詩中景間對文公盡日論趙萬宗入道因寄羔鴈已聞徵不起却求披戴守貞居月堂欹枕三清夢秋榻生塵萬卷書壇匝冷痕春蘚碧鶴翹寒影雪杉疏年來未得尋幽跡間夜何人聽步虗春日湖居書事寄子璿師間居作賦擬安仁壯志潛消白髮新煙浪靜牽來往夢鶯花深慰寂寥身野塘草緑湖村暮石鼎茶香嶽寺春終學支公買山住白雲深處待為鄰酬正言上人旅鴈聲孤過舊林相懷無處共論心眠雲未負他年約看雪難忘盡日吟江上信稀寒浪闊竹邊房掩夕陽深寂寥間坐西窗下空把餘情寄玉琴贈清義律師律藏精持世所稀淡然高趣自忘機禪開靜室蒼苔遍飯起間窗獨鳥歸雪嶽夜鐘清度枕水軒秋月冷侵衣吟餘講罷無他事人外時容扣竹扉遊開化寺地絶纖塵萬籟清當門幽致畫難成黛粧峯岫高低影練卷波濤旦暮聲侵竹古廊秋蘚合倚雲禪閣夜燈明上方別有幽棲處樹石參差稱野情次韻酬子文師門靜孤雲去復還講餘他慮絶相關遺名懶住城中寺招隱曾居海畔山臥疾雪房苔色老行禪秋徑樹陰間玄機共了心無事相見寧愁𩯭漸班南塔寺上方絶頂深棲萬慮平路盤危石雨苔青江涵逈漢供間望雪映幽窗卷舊經磬擊曉霜禪乍起枕搖秋浪夢初醒為鄰自有忘機者月下時時扣竹扃寄贈子正律師威儀間淡許誰同苔徑依然絶履蹤霜井濾泉侵曉色雪房欹枕夢諸峰寒生靜榻吟中月冷答平湖講次鐘盡日冥心憶高趣三生行止道生松憶南塔上方因寄慶昭師杉竹森森一徑通六年高院寄幽蹤涼移峭壁秋深月冷映長江雪後峯吟次夏雲晴影薄講殘春樹翠陰濃四時嘉景真堪愛曾伴支公數倚笻庭松喬枝偃蓋勢凌雲一植幽庭度幾春榮落未曾同衆木孤貞長自伴間人風生靜夜寒聲健雪霽遙峰翠色新蕭灑最宜禪定起坐觀行繞遠埃塵寄曦照上人塵外禪房掩渺瀰高情終與俗流違苦吟幾度成華髮默坐連宵憶翠微風帶荷香飄靜榻雨滋苔色汙間扉炎天幾阻相尋興空倚危樓對落暉
