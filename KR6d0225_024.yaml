body:
  text: 宋孤山沙門智圓著答李秀才書隴西秀才昨惠書屬愚故疾屢作而弗果答邇者又以手簡為貺遂并而閲之而皆辭理端徑志氣激揚將欲刮去浮華驅還淳正言何大而旨何深邪不以愚為無似者謂知古人道有古人文此亦秀才謬聽之過也然愚於林下養疾講佛經外亦頗有志於斯文秀才知我者驟扣於愚愚如不言是失人也今陳顛亂一説惟秀才聽之夫論文者多矣而皆駮其妖蠱尚其淳粹俾根抵仁義指歸道德不爾而但在文之辭似未盡文之道也愚竊謂文之道者三太上立德其次立功其次立言德文之本也功文之用也言文之辭也德者何所以畜仁而守義敦禮而播樂使物化之也功者何仁義禮樂之有失則假威刑以防之所以除其災而捍其患也言者何述其二者以訓世使履其言則德與功其可至矣然則本以正守用以權既辭而闢之皆文也故曰仲尼祖述堯舜憲章文武焉堯舜非德邪文武非功邪故愚嘗以仁義之謂文故能兼於三也以三者豈越仁義哉或曰經天緯地曰文聖人之説也子以仁義不亂其非聖邪曰夫仁義者在天曰陰陽在地曰柔剛非夫仁義則胡以經乎天非夫仁義則胡以緯乎地是故率天地之性而生者心必則乎德義之經口必道乎訓格之言言之所施期乎救弊且句句警䇿言言針戒尚慮無益於世而代人競以淫辭媚語聲律拘忌夸飾器用取悅常情何益於教化哉何益於教化哉然則用心存公性其情者然後可立於言苟心之不公情之不性雖艱其句險其辭必有反經非聖之説者故率情之所為未見有益於教也或曰情動於中而形於言何率情之非乎曰有是哉節情以中則可噫立言者莫不由喜怒哀樂內動乎夫喜而不節則其言怒而不節則其言訐哀而不節則其言懦樂而不節則其言淫樂不至于淫哀不至于懦怒不至于訐喜不至于惡則貶而懲之善則褒而勸之本之以道德守之以淳粹則播于百世流乎四方踵孟肩楊諒無慙德矣故曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也故愚以庶乎中和為立言之大要也則德乎功乎可踐言而至也秀才以為如何哉惟秀才圖之與門人書近得汝書云以吾所撰界相榜序勒石以圖不朽亦宜矣吾雖不敏而實録其事庶可貽後也客有至自華亭者謂吾云見石上刻界相字改為戒字吁可怪也為寫者無識誤作耶為汝輩不知所以妄改耶果寫者之誤亦汝過也此序汝之請也汝實尸之其猶虎兕出柙龜玉毀櫝誰之過歟夫經史子集假借之字則有之矣禮記逍遙作消搖早暮作蚤莫左傳埋馬屎史記三遺屎皆用弧矢字莊子筌作蹄史記羅作爵文選吳越作此皆假借或古字然也若疆界字不聞假借戒慎字也況結界戒律之名出乎佛教佛教始乎東漢律藏譯在後秦後賢製字頗足佛教憑之故假借者或寡矣故結界戒律之名本諸律藏二字元分何輒改之耶以此勒石非圖不朽之謂也適足播醜於後世取笑於四方耳然有識者讀之不察其所以必罪吾心之荒吾學之寡也其或察其所以者必罪寫者之誤作後生之改也噫苟百世之下四海之人皆有識也果能罪吾心荒也學寡也吾所以懼者竊恐吾沒後童蒙輩以吾為古人也且曰此能序事也必有學矣既勒于石也必可則矣既謂有學矣可則矣乃謂結界之字宜作戒律字書之也苟見是者謗以為非執此之非崇以為是人或告之以正必扞格而不受乃曰彼古人也勒于石矣豈非哉由是一以教十十以教百百以教千至于無窮漫衍天下速若置郵何其然耶正説難行邪説易行必然之理也若然者是吾亂名改作聾瞽於後學也豈不大懼乎以吾尚知大懼汝誤吾之文誑後之人安得不益懼於吾乎汝宜速磨滅改正之無貽我羞
