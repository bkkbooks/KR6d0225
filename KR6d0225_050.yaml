body:
  text: 宋孤山沙門智圓著懷南遊道友曾聞飛錫入南閩鶴態雲蹤不可親靜夜獨吟空對月昔年聚話更無人波濤路阻書難到泉石房間夢自頻未省相逢在何日西風蕭索浙河濱栽花移花來種草堂前紅紫紛紜間淡煙莫歎朝開還暮落人生榮辱事皆然病起二首衡門牢落雨苔斑病起深秋氣象間照水未能嗟白髮倚欄重得見青山風高砌木蟬猶噪社近茆堂燕已還孤坐孤吟又終日有誰來此問衰顏又湖天淡蕩鴈參差行樂搘笻繞所居古壁苔荒鳴蟋蟀水軒風冷謝芙蕖看雲默誦空王偈拂榻間開孔聖書閇戶無人慰寥索草堂深夜照蟾蜍寄題虎丘山崛起孤峯號虎丘奇蹤寧與衆山儔月涵秦始劒池冷蘚駮生公講石幽招隱未能居絶頂臥雲空欲斆前修披圖盡日身難到杳杳煙波茂苑秋漁父鶴髮間梳小掉輕蘆花深處最怡情自憐身外唯煙月肯信人間有利名間脫緣蓑春雨霽醉眠深浦夕陽明陶陶終歲無人識應笑三閭話獨清水本性澄明萬古同滔滔潤物信無窮百川奔注歸滄海五服安居賴禹功動帶晚風衝島嶼靜涵秋色混虗空浮舟葬骨成何事范蠡知機伍相忠白蓮栽種空池歲已賖暑天開處異羣花澄波照影疑秋鷺靜夜擎香混月華雪態自堪憐翡翠玉苞終恥近蒹葭間來倚檻看無猒為似禪心本絶瑕暮秋嗈嗈賓鴈又隨陽兔走烏飛兩共忙露冷小池荷減緑風高幽砌菊添黃圓明自喜心如月皓白誰愁𩯭似霜間臥不堪思往事星河耿耿夜偏長養疾深院無人疾漸輕西風黃葉滿間庭行披老子五千字坐讀楞嚴十軸經籬下清香寒有菊窗間微影夜無螢誰知夜裏珠長在堪歎悠悠醉未醒君不來前年送君空江上張帆正值西風起今日西風君未歸茫茫只見空江水扇霜縑裁製賴金刀冷淡還宜畫海濤盛夏有功風自遠涼秋無用架偏高談筵幾謝驅煩熱征路長𫎇解陶未得袁宏手中握揚仁何處可施勞新栽小松新種孤松一尺餘淡煙疏竹便相宜間來且玩凌霜貌身後誰觀合抱時冷碧豈容塵染汙貞心寧共草凋衰夜深庭際清風起細韻難教俗耳知間詠造化無餘豈有私如何庶物自參差群烏不涅身長黑雙鷺無愁頂亦絲巖桂翠濃深雪夜井桐黃落暮秋時虗空世界都如幻楞嚴曰迷妄有虗空依空立世界又曰自心取自心非幻成幻法莫把間心逐境思楞嚴曰不取無非幻非幻尚不生幻法云何立新栽竹傍砌疏篁手自栽數竿蒼翠勝花開今宵窗下更深睡應送寒聲枕上來讀元結文復古還淳元結文可憐楊浚獨知君當時自號為聲叟五交切次山道號也立事垂言信不羣戲題夜合樹明開暗合似知時用舍行藏誡在茲緑葉紅葩古墻畔風光羞殺石楠枝病中感體元上人見訪犬吠衡門宿霧消草堂風冷竹蕭蕭若非故友憐衰病誰肯凌晨訪寂寥寄瑞應經疏及注陰符經與體元上人瑞應陰符盡索看封題欲寄意盤桓自慙才識非通敏不得同歸得異端病起自嘲林下羸羸一病軀四旬欹枕減肌膚間來試照秋泉看金鍍形容雪染鬚戲題四絶句并序潛夫之居瀕湖倚山有野鶴野鹿焉以為耳目之玩有家雞家犬焉以為警禦之備潛夫每自色目其鶴為在陰其鹿為食蘋其犬為吠月其雞為司晨有時天雨晴秋氣清在陰唳于大澤食蘋鳴于幽谷吠月吠于間軒司晨啼于喬木音響更作似於潛夫前各大誇其能也傳稱介葛盧別牛鳴世謂公冶長辨鳥語信矣夫先民有通於禽獸語者吾無先民之能以意度之似有所得遂為四絶句以見其意適足以自取歡笑乎昔者樂天為八絶蓋陳乎鶴雞烏鳶鵝贈答之意故吾得以斆嚬焉噫亦有所警非直以文為戲云耳得前詩所謂彼我更相笑是非無實録者斯四絶也近之矣鶴自矜紫府青田任性游一聲清唳萬山秋仙材況有千年壽鹿犬凡雞豈合儔鹿讓鶴身有素斑文既備頂峩雙角武仍全我兼文武為時瑞汝但白身空有年犬爭功雪毳文毛虗有表防姦禦寇且無功中宵誰解頻頻吠庭皎秋蟾樹裊風雞怨言三箇因何各自強𥪰誇己德掩他長冥冥風雨茆堂閉至竟誰先報曉光
