body:
  text: 宋孤山沙門智圓著古詩湖上秋日南山雨初霽東岸夕陽明搘笻立回塘頓覺耳目清皋鶴知秋意唳風三四聲紅蓼弄秋色紛紛滿前汀柳徑孤煙白漁村野水平興盡獨自歸寥寥掩柴扃新月為吾上庭蟬為吾鳴吾生本無事對此堪怡情喻賣松者莫嫌人不買人亦愛蒼翠却是歲寒根難種塵埃地且歸栽澗底映水成嘉致他年苟合拱採取不我棄天子建明堂此為棟梁備秋病買藥囊無金伏枕頭有霜夜深不得睡隙月射秋床偶作急急西落日浩浩東去波日落波不停浮生能幾何青雲身未上白髮頭已多金印未佩腰道路成蹉跎一朝忽得志頓忘貧賤事八珍食方丈華轂駕天駟民瘼無術醫貪狼有心恣無何觸天網禍淫諒不爽餘殃及子孫豈只身長往寄語求名土得志莫如此不善宜先知行道慎莫止仁恕及蒼生忠貞輔天子好爵終自縻盛烈垂千祀西日與東流任彼漼寒暑須知君子人身死名不死松風青青數樹松扶疏空庭裏微風從南來清聲四向起俗兮聞必愁吾也聞則喜昂頭離石枕扶羸憑藤几側聽復遙觀移不能已細葉舞輕煙密影搖寒水何必鈞天奏豈羡霓裳妓萬事更無求深山此為美寂寥信為樂軒冕誠堪恥誰謂茆山中只悅陶公耳古劒精剛經百鍊可折不可柔三尺青蛇活一匣止水秋解截蛟龍軀能斷臣頭下去蒼生害上除天子讎在昔埋鄷城精光射斗牛雷煥張華輩得之亦悠悠二賢既云亡潭底化雙虬劒利人或愛劒道人不求劒道如之何達者惟莊周自勉達人貴無念市朝亦山林曲士居山林難息市朝心坐馳一室中紛然萬境侵紐蘭羡珮玉坐石思黃金羊質虎其皮隼翼鳳其音志在求世利口唱無生吟吾非斯人徒夷曠期復古去住既任緣喧靜亦隨所陶然且無求相命何足語人生百歲壽稀得七十死吾今四十五氣力漸無似去年成二毛今年動一齒縱得至七十光陰能幾許學道宜無疲進善宜無止自餘百雜事克己盡除去勉強扶幻軀旦暮加藥餌此身乃外物何況外於是內外一如夢勉矣當觀此鼓銘中虗本道待擊揚聲入夢宣偈落日肖形晝説無怠西歸有徵濡毫作銘敢告含靈病起自敘盜跖死牖下伯牛遭惡疾報應似無徵蒼蒼意難悉及考竺乾教其旨明踰日業以三世論事匪一生訖伊余本好道執善長慮失無端六腑病每苦我形質百骸失調暢四時少安逸今歲夏云滿秋熱如火室脾疾因茲生頓覺減寢食無何誤服藥倒瀉苦非一過客為憂惶兒童亦戰栗吾心暗且喜浮生從此畢發言囑後學此事汝無恤吾年四十五去矣非短屈至理無去來妄想分凶吉我先鑿山窟汝宜即藏密不用報親朋無學世哭泣四時為送葬庶物甚充給遣文三百卷空言或可習見惡如探湯見善如不及湛湛無生源深淺當自挹囑之語方終忽覺病小醒扶几起暫坐漸漸四體輕又過三五日倚杖登危亭俯首視群物仰面觀太清秋山疊疊翠夜月圓圓明豈意今之日猶存危脆形憑欄不忍歸聊適我心情虗幻三界中旅泊非久停獨遊城市非無親不見歲已深江湖非無友經年無來音因知疏拙性不合時人心清景將誰觀荷策只自尋乃登嵯峩峯乃縱酸寒吟狎我惟野麋和我惟幽禽但見雲起滅不知誰升沈盤桓紅樹下秋露濕衣襟言志疇昔學為文擬盡周孔道心勞道未至壯歲成衰老疇昔學為詩模範風雅詞立言多諷喻反為時人嗤為詩復為文嗟嗟不復古訓世無纖益何為自勞苦權門既不遊青山寧合負一來林下居四載不出戶退省為佛徒講經自裨補憧憧來學輩往往入深塢智者乃吾宗龍猛乃吾祖寒窗夜摛毫虗堂晝揮麈翼此二聖心欲令萬物覩羸羸長抱疾行年四十五草堂三四間牢落連雲洞經時無客來衡門絶迎送榻有無絃琴向風時一弄窗列楞嚴典要言長諷誦真妄一無得超然誰與共凡聖病眼花死生春夜夢病差夢已醒萬彚徒營營病中玩月歲歲中秋夜玩月泛平湖今為病所侵伏枕此約辜輾轉席蓐間四體如松枯辛酸滋味加間況適興徂入夜月漸高晃晃照廊廡冷色射軒窗爽氣襲庭蕪澤畔唳孤鶴聲聲若相呼是時披衣起頓覺病魂穌倚杖來前軒竹榻教人鋪與月相對坐歡玩如同徒流睇及群物光彩一何殊遙山列銀屏空潭開玉壺樓臺飾瓊瑤階除若冰敷寄語求仙輩何必去玄都逡巡月西落佇立更踟蹰一別又一年明年知在無潛夫詠有叟匿姓名自號為潛夫潛身在雲泉潛心入虗無身心俱已潛質直反若諭智者謂之智愚者謂之愚愚智自彼異潛夫未曾殊陶陶樂天和任性何曾拘宗儒述孟軻好道注陰符虗堂踞高臺往往談浮圖漫衍雖無家大方貴無隅俗人每側目訂之為狂徒素隱而行怪執政宜先誅天公既保全幸得存微軀衝雪登高山乘月泛平湖性靈敵雲間形骸類松枯何以免飢寒認得衣中珠松下自遣聚氣成此身假緣暫寄世可憐自在性本無煩惱繫傍水與登山翛然有深詣日在林下遊暮在林下宿供飲巖畔泉充庖檻前菊半月一剃髮半年一洗浴但得恣疏懶何曾有榮辱新秋雨初霽圓月照我屋扶病起看月坐久偶成曲人生天地間性分各自足捧檄何必喜途窮何必哭容彭不為長顏楊不為促四者俱如夢何為自羈束彼笑我太狂我笑彼太俗彼我更相笑是非無實録不如長默默恬淡過昏旭淵魚與林鳥各得隨所欲舉頭誰是友風月與松竹哭葉授今春聞落第為君心悽然束書獨南還憤氣胸間闐迹寄浙河旁家延南海邊遘疾既彌留一命成棄捐囊中無餘金零落空文編龜鶴本微類享壽皆千年如何君子儒三十歸重泉天高不可問為君強問天讀白樂天集李杜之為詩句亦模山水錢郎之為詩旨類圖神鬼諷刺義不明風雅猶不委於鑠白樂天崛起冠唐賢下視十九章上踵三百篇句句歸勸誡首首成規針謇諤賀雨詩激切秦中吟樂府五十章譎諫何幽深美哉詩人作展矣君子心豈顧鑠金口志遏亂雅音齪齪無識徒鄙之元白體良玉為碔砆人參呼薺苨須知百世下自有知音者所以長慶集于今滿朝野孤山種桃領童間荷鋤埋核間羣木他人顧我笑豈察我心曲我欲千樹桃夭夭遍山谷山椒如錦爛山墟若霞簇下照平湖水上繞幽人屋清香滿鄰里濃豔蔽林麓奪取武陵春來悅遊人目花開復花落知榮必有辱榮辱苟能齊人人心自足須知我種桃可以化風俗寄林逋處士湖山淡相映世塵那得侵杳杳煙波色蒼蒼雲木陰苔荒石徑險犬吠桃源深中有上皇人高眠適間心花開還獨酌花落還獨吟空庭長瑤草幽樹鳴仙禽不見已三載鄙吝盈虗襟終期秋月明乘興間相尋早秋雨歇變氣候空庭葉間聽一枝風乃知千里秋百蟲鳴四壁新月生高樓登樓看明月清先滿林丘人生呼吸間何為苦憂愁髮白不再黑兔走難暫留徘徊感古人勸我秉燭遊心交如美玉心交如美玉經火終不熱面交如浮雲頃刻即變滅對坐成參商咫尺成胡越我有心交者不見幾歲月山疊水茫茫含情向誰説古人與今人古人與今人祿仕一何異古人貴行道今人貴有位古人貴及親今人貴悅意古人同白日光明溢天地今人如履險動足易顛墜古道如可行斯言不遐棄代書寄奉蟾上人君居武康山昔年我曾遊崎嶇松徑寒冷落竹房秋握手既歡笑拂榻且相留一駐十旬餘旦夕樂清幽因話淨名事滌硯勉操修吾於是撰淨名埀記十卷經疏科六帖蠻香爇古篆山茶分越甌看雪同擁爐乘月共浮舟喻心指太虗視世類浮漚明春我歸去湖上隱林丘杜門過五載脾疾日少瘳間宵坐月下往事來心頭書之將寄君路遠水悠悠
