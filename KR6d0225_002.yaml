body:
  text: 大宋孤山沙門智圓著遺教經疏序夫法身無象不生不滅至理絶言非小非大既而茫茫萬彚迷而不復冥冥群有流以忘返是故能仁大覺運無緣至慈出五濁惡世應物現形隨機授道或頓霑大益或漸入佛乘或圓機未熟終稟小化託餘佛而決了指他國以會歸既一期事息故雙林告滅巍巍聖德蕩蕩玄化包十方而非廣亘九世而非遠蓋不可得而思議焉佛遺教經者其終稟小化之謂與將慮夫滅度之後也戒珠掩耀法乳澆薄乃於中夜有茲顧命於是乎澡身浴德者遊泳於解脫之淵跂高履尚者馳驚於清淨之道正法由斯而久住諸天於是以致敬王臣庶幾其化士民寅亮其風大矣哉遺教之益也如此非夫大悲淳至俯哀未習者其孰能臻於此耶在昔天竺馬鳴論之於前楊隋靈疏之於後逮乎李唐懷素律師者亦有斯述慨茲兩疏今也則亡遂使茲經傳授道息嗟乎法雨愆期炎炎之火宅莫救辨雷匿響蠢蠢之迷蟄未發每一思及嘗疚于懷由是不揆檮昧彌縫其闕用馬鳴之章句遵智者之法門依經辨理亦已備矣雖不足以下武前哲而聊可以詒謀來裔云瑞應經疏序夫真身湛爾非色象之可見妙道寂然豈文字之能説至哉能儒調御妙覺真人得非色像之法身證無文字之妙道觀乎三界憫彼羣迷於是乎非身現身俯提弱喪無説而説下擊童蒙既而機有利鈍故法分高下譬諸鑒明不動妍醜因形而現水性無變方圓逐器而改若乃深求其致則咸會一如仰觀本懷則唯為大事盛矣美矣蓋不可得而思議焉太子本起瑞應經者如來演説旨趣淵博恭明翻譯文辭炳爛言本起者則碇光與記言瑞應者則王宮誕爾總茲二事立此美號蓋小機之所見乃鹿野之始説陳乎事則陟遐自邇指乎理則極深研幾實照昏衢之耀靈裂惑網之太阿也嗟乎古無贊述世弗流通豫實無似輒為解釋雖鴻筆麗藻大有愧於前修而考文責實亦無慚於來學云觀普賢行法經疏序夫觀普賢行法經者乃法華三昧之要門一實境界之直道也論事儀則六根顯過考理觀則一心本空實生死海之巨航煩惱病之良藥矣嗟乎至與後學弗傳遂扶疾含毫為經作疏雖擘肌分理未能符於聖心而合異離堅或可益於來裔也佛説阿彌陀經疏序夫心性之為體也明乎靜乎一而已矣無凡聖焉無依正焉無延促焉無淨穢焉及其感物而動隨緣而變則為六凡焉為三聖焉有依焉有正焉依正既作則身壽有延促矣國土有淨穢矣吾佛大聖人得明靜之一者也乃假道於慈託宿於悲將欲驅群迷使復其本於是乎無身而示身無土而示土延其壽淨其土俾其欣促其壽穢其土俾其厭既欣且厭則漸誘之䇿行矣是故釋迦現有量而取穢土非欲其厭邪彌陀現無量而取淨土非欲其欣乎此則折之彼則攝之使其復本而達性耳故淨名曰隨所調伏衆生而取佛土者其是之謂乎雖寶樓金池為悅目之玩而非惑蕩之色而能達唯心無境矣雖風樹鳥聲有入耳之娛而非惉懘之音而能念三寶有歸矣夫如是則復乎明淨之體者如轉掌耳經云衆生生者皆是阿跋致是也大矣哉聖人之善權也如此是故群經森列而偏讚淨方其有旨哉佛説阿彌陀經者其偏讚之謂歟吾愛其辭簡而理明其文約而事備足可以誘弱喪而擊童蒙焉於是約龍樹之宗準智者之説依經辨理為之義疏若極深研幾則吾豈敢庶乎有助於真風為益於後昆爾
