body:
  text: 宋孤山沙門智圓著觀經疏刊正記序豫稟受法師奉先尊者諱源清撰記二卷解此經疏曰顯要者學者盛傳之師嘗患未盡善也而更事補削其功未就無何山頽梁壞一十七載於茲矣豫竊追念往事黯然感懷遂考文責實刊而正之義門之壅者闢之觀道之莽者芟之非苟見異於前人蓋欲成其先志爾厥或來者舍而不由非豫罪也時大宋大中祥符八年龍集乙卯二月朔於西湖崇福寺講院序般若心經詒謀鈔序序曰此經理幽辭要中庸子嘗以三觀義疏之吾恐後昆惑疏之之言於是作鈔以翼之號詒謀焉金光明經玄義表微記序或曰斯文之記者有人矣子何以述為曰吾聞前修之有作也後之人復有述焉者必有異乎夫前之廣也後必有好略者述焉前之略也後必有好廣者述焉前之是也後必有僻解者述焉前之非也後必有獨斷者述焉苟非好廣與好略與僻解與獨斷與亦有竊乎筆削之名者述焉吾之述雖有意於表明微旨啓迪來裔而思拙言蕪又昧於自知而不知好略乎好廣乎僻解乎獨斷乎竊名乎凡茲五者盡俟輿人訂於吾爾於戲厥或有益於化源則吾之眇劣安敢逃其責邪其藁既成因自序之以道其意云大宋天禧二年戊午歲十月十九日於瑪瑙坡玉峯亭序金光明經文句索隱記序豫養疾于錢唐郡西湖之孤山忝訓人以三觀學其或病之間誨之隙則好把筆以銷日由是智者之所說荊溪之未記者悉得記之茲疏荊溪之未記者也而辭語高遠旨意纖密往者之闕疑來者之未喻亦多矣豫不揆無似因為之記凡四卷庶有裨於吾道也而以索隱命題焉索者求也求幽隱以伸之也其有求之不盡者俟後賢以求之噫雖四海之廣百世之遠與吾同道者則知吾志與神宋天禧二年歲次戊午十月八日於瑪瑙坡負暄亭序此記於筆草藳亟為後學所寫洎乎尋繹頗有添削若曹後學宜依此本
