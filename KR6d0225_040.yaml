body:
  text: 宋孤山沙門智圓著經武康小山法瑤師舊居至道不可狀至理杳無名萬彚喪其源出沒何營營忽焉生法瑤研慮還淳精立言宗能仁百也馳休聲我來訪舊居景物如有情間庭慘樹色空山咽猿鳴斯人今也亡孤棹尋歸程西施篇採蓮越溪上皆謂尋常女正位吳中官衆口方傳美視聽猒歌舞衣裳賤羅綺賢哉鄰家人昔年知斆嚬寓興遵聲淫復蕩魯受齊人歸音饋古樂和且正翻使文侯睡言耳樂聞直道心翻忌唯知任所好何曾顧顛墜古樂與鄭聲邪正宜留意山中自敘閉門業文翰誰謂溪山陋間臥貴道肥誰謂形容瘦斯言欲無玷內省庶不疚深識淺江海寬量窄宇宙鄰女少斆嚬海夫多逐臭時來松下坐清風滿懷袖莫言春日長莫言春日長一坐又西暮衆芳榮復落萬事新成故臨川久興嗟藏舟孰云固蕭然蕩斯慮空門有歸路講堂書事早玩台衡宗佛理既研精晚讀周孔書人倫由著明達本與飾躬志在求同聲擊蒙雖云勞來學苦無成楊雄玄尚白仲尼道不行青山夢中歸華髮年來生唯當照真空萬事從營營勉隱者潺潺㵎中水不入貪夫耳茫茫陌上塵不霑靜者身靜者貴寡欲貪夫常患貧躁進陷邪潔己廢大倫況當文明時草澤羅賢人行道尚中庸蠖屈宜求伸鑑佳人磨拭頻常恐塵埃侵皎皎夜月明澄澄秋泉深徒分妍醜容不鑒是非心山中行苒苒巖上雲潺潺㵎中水山鳥如喚人喃喃深林裏送僧秋風吹行衣舊山逍遙歸齊盂滌空潭古磬敲殘暉須知高靜懷杳與塵俗違答行簡上人書偶依溪上居三見改時候來書問蹤跡行坐置懷袖學道不加前多慵還似舊苦吟徹宵夜間眠消白晝古屋荒莓苔幽庭下猿狖巧僞非吾好直方自大授侯門絶請謁雅誥勤研究悠悠皆面朋誰能論去就夏日薰風亭作四野炎炎暑氣隆危亭孤坐與誰同湖光淡蕩涵殘照鳥影參差沒遠空消息浮生憑至理破除煩暑賴清風明時不敢言招隱自樂林泉慕遠公初晴登疊翠亭偶成杳杳遙空雨乍晴間拖山屐上山亭平湖風靜開菱鑒疊嶂雲收列畫屏已覺萬緣真是夢豈因間事妄勞形可憐競利貪名者擾擾人間醉未醒李秀才以山齊早起詩見贈因次韻和酬搜奇適異興何全雅句分明敵惠連丹桂平窺君有分紅塵間去我無緣陶情嶽雪時同望解睡山茶夜共煎靜語前塗俱有意謝公紅藥遠公蓮對雪冷結平湖絶棹過紛紛盈目趣如何侯門歌舞看難足編戶飢寒心厭多旋滿間庭誇玉砌重欹幽樹鬬瓊柯夜來孤坐書窗下猶賴虗明自琢磨孤山詩三首樓閣壓危碧山根疑有鼇隔湖千嶂斷出水一峯高巖冷秋空月林清雪夜猱伊余絶羈束長得恣遊遨其二四絶塵埃路孤山景實孤危巔侵逈漢冷色浸平湖古塔名支佛辟支佛塔在山之絶頂新泉號僕夫山西瑪瑙坡有僕夫泉中庸子新開鑿者王維在何處奇跡更堪圖其三仙島湖西見湖西景有餘春融迎曉日秋碧礙空虗竹蔭高僧塔唐高僧慧琳大宋高僧晤恩二塔存焉雲迷處士居處士林逋高節不仕隱居茲山史遷今若在此處合藏書酷熱酷熱如小人到處苦相侵清風如君子時來寬我心酷熱驅不去清風留不住此情無以訴吟傍陰陰樹有客有客有客來扣我門相見無言自晝達昏搘肘憑欄俯仰乾坤百年瞬息得喪誰論遠山青青巨浸渾渾忽然歸去目擊道存酬仁上人望湖山見寄次韻平波映危碧清景異塵中雪霽寒侵郭秋澄冷照空眠雲徒自樂浮棹約誰同幽趣何人識搜吟愧遠公和辨才訪仲微上人不遇不見二十載重尋事更違門臨寒水閉鳥向夕陽歸吟恐成華髮間疑入翠微登舟獨南去乘興一何飛次韻酬明上人養病孤山下消搖任野情間門浸寒水高檻露荒城砌月移杉影巖泉隱磬聲唯君許來此相伴老餘生寄同志靜院無來客相懷日又曛數峰寒有雪一榻靜眠雲幾歎淳風喪寧容俗態羣終期一相訪對坐議新文和聰上人悼梵天闍梨講院悲風動素帷搖松難更見吾師塵生舊榻休開卷月上秋軒罷賦詩真法自將傳後學清名誰為勒豐橫經弟子懷高跡共指龍華作後期孤山間居次韻酬會稽仁姪見寄山聳湖心住任緣考盤茆舍閉深煙月澄秋水牽吟思花滿春巖照困眠觸石微雲間致雨鳴皋孤鶴靜聞天會拋此景相尋去渺渺滄江片席懸
