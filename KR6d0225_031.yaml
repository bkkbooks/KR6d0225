body:
  text: 宋孤山沙門智圓著錢唐孤山智果院結大界序大雄氏制苾芻之居而必結其大界者所以章佛剎之提封為集僧之分限歟既無奔馳損道之咎而辨生善滅惡之事其制也如彼其列也如此智果院者西湖鑑映孤山屏倚澄波渺渺而秋淡喬木蒼蒼而夏寒實釋子修真息心之地焉建創之歲即後唐同光三年也自是師終資及住持者五世矣然皆勤於完葺而怠於結界今尸其院者曰有祥能懼其未遵佛制也而不遑寧居乃請善毗尼者作法而結焉即天禧四年五月十日也既結焉復從吾乞言以序其由凡二年矣吾嘉其樂善一日興來遂為書其事即五年倉龍辛酉夏五月八日也天台國清寺重結大界序天台也長于衆山國清也甲于諸剎巖穴窈窕則仙靈之所宅樓臺輪奐則佛事之攸歸先是陳隋間有聖人焉曰智者大師演道於茲山而遺囑建此寺也是故寺有聖人之遺風焉苾芻之徒能稟佛化靜則服其禪悅動則遵乎律範由是海內之淨衆咸稱國清之威儀焉然則律範之大者其在乎受說安恣歟行斯四者非作法之地不可也以是觀之則知結界之事復大於說受安恣矣真毗尼之權輿伽藍之先容也吾君建皇極而居大寶用真宗而毗大政夷狄輯睦黎元樂康乃眷斯山乃葺斯寺堂廡革故壇場鼎新由是四方之界洎乎戒場之界而標準俱易矣故律師某勇於為法遂集衆旅席而解舊結新焉即某年某月某日也自是戒律彛章用之靡閒住持規矩婉而可觀嚮所謂有聖人之遺風者豈誣哉錫紫沙門曰光逈綱領來學為律宗主忽振錫浙右欵關林下且謂蒙學天台之道以知其山由山以知其寺重法尊祖必無吝於辭也乃以序引為請蒙因諾焉適值蒙有幽憂之疾方且治之而於操染未暇三載于茲矣今客有告游天台者遂撰其辭以寄之塞逈公之請也是時天禧五年倉龍辛酉春正月十三日於瑪瑙坡疊翠亭序杭州法慧院結大界記結大界者何所以指其封域俾同遵於律範也律範者何所以防過非而齊身口也大界苟不結則律範無以行律範不行則身口無以齊身口不齊則定慧無由著定慧不著則聖道無以成以此計之成聖道者不權輿於結界乎法慧院者舊名大中興慶即唐天祐四年青龍乙卯武肅王錢氏建之也是時吳越開國武肅修小白重耳之事奉正朔於王室以令諸侯而天資英靈頗崇釋氏既生於宣宗大中年間及斯院之落成也因以大中興慶為名焉今聖受天符於上帝天下仁祠仙館皆易其名以新之故有今法慧之賜也茲剎之興既多歷年所舊雖結界矣而其榜不存僧之耆艾者亦不知涯畔焉而況於後進乎是以說戒自恣毗尼章皆寢而不行慈化大師曰仁永者嗟歎久之遂請知律人集衆旅席解舊而結新焉乃榜其標相懸之顯處使後來者既識其封域則律範得以行身口得以齊定慧得以著聖道得以成美矣哉為一事而數善從之者不在茲乎寶印大師曰法明扣關林下乞言於我且曰以圖不朽吾乃筆其事以塞其請焉皇宋天禧四年庚申夏六月上日記
