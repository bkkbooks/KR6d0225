body:
  text: 宋孤山沙門智圓著經松江陸龜𫎇舊居甫里舊深隱夫君道不行清名身後在明月夜來生寒水曾垂釣春田久廢耕空遺散人傳千古見高情經照湖方干舊居磻溪垂釣者終得展其才何事先生隱不逢明主來泉聲秋雨歇月色夜雲開對此空惆悵吟魂早𣆶回玩月去秋曾久玩皓魄墜天涯始恨經年別還欣此夜期鳴蛩沈古砌驚鵲繞寒枝莫猒憑欄久冰輪覺漸移憶龍山院兼簡蟾上人幽景遠囂俗重來興未窮鐘聲翠微裏剎影碧溪中地冷庭松瘦門閒野徑通幾因深夜話密雪下寒空間居示友人冷淡誰知趣間房枕水湄秋窗開暮景孤枕夢天涯道直時流笑心清夜月知何當學支遁共約買山期孤山間居次韻酬辨才大師地僻人稀到病來無話端遠山游未得終日臥中看藥篋經梅潤松窗過雨寒唯師知我趣塵事絶相干山中感友生見訪講餘多滯疾林下掩重扉度日人稀到殘陽鳥獨歸山光來有勢雲影去何依世態那堪說唯君念息機舟次遊乾元寺古樹垂清陰維舟暫登陟間吟塵想絶久坐天籟息幡影揚晴空溪光澄暮色掛帆尋去路煙水杳無極風造化不可測分明有所依冷和秋葉動送客暮帆歸掃霧離遙嶽飄香出靜扉西齊獨吟坐蕭颯滿禪衣雨潤物有深功霏霏下半空寒聲清入竹斜勢急因風苔片添秋碧花枝損晚紅山人獨欹枕靜聽草堂中草淺碧與深緑萋萋古岸傍旅愁生暮色吟思發清光過雨侵間徑披煙上壞墻更堪思往事金谷舊年荒寄湛上人幾年辭輦寺擁衲住雲林上國歸心絶千峯去夢深殘經看雪卷好句聽秋吟曾有尋高跡禪房古木陰秋夕滄江秋色暮幽思起窮居風葉寒侵夢窗燈冷照書砌深蟲韻咽天淡鴈行疏終謝人羣去孤峯待結廬題湖上僧房深隱遠城郭平湖景色間苦吟終夜月清夢徹寒山徑冷秋苔合庭幽嶽鳥還紅塵趨𥪰者誰得扣松關送悅上人歸仙巖道性輕為別荒城夕照陰波濤歸路遠雲木舊山深夜定依霜島中餐狎野禽禪房清景在飛瀑映疏林聽琴自得南風旨虛堂此夕彈正聲傳不易俗耳聽終難峭壁蟲音絶喬枝鶴夢殘坐來消萬慮斜月上危欄寄咸潤上人流俗不知處深棲趣轉幽間房扄翠嶽遠信隔滄洲定起花殘砌詩成雪滿樓相懷未能去南北路悠悠寄葛溪爽上人削盡浮華念間居道已成夢幽關水石門冷掩杉柳百衲禪中弊蒼髭病後生何人問真理笑指葛溪聲題靜慮院下瞰諸峰頂雲泉絶四鄰暫遊非俗客深隱屬間人石隥秋苔滑蘿龕夜月新終期結幽侶來此謝紅塵寄吳黔山人鳥外自長往人間過幾年狂吟輕歲月高趣狎神仙醉臥雲蒸榻漁歸雪滿船相思未相識終夜夢林泉懷友人憶向荒原別殘陽雪霽初幾宵成去夢經閏絶來書處世慵難減眠雲癖未除幽懷向誰說昨夜對蟾蜍聞蟬江天涼雨霽嘒嘒出疏林清極殘陽裏愁生遠客心離亭秋草碧荒塹暮煙深不忍多時聽吟髭雪暗侵書友人壁不問人間事連年鳥外居白雲吟次見青壁醉來書掃石秋苔駮開窗夜月虗于時已無念生計有樵漁哭辨端上人平昔於詩苦精搜省未間壞房空鳥外清句滿人間瘦影懸鄰壁孤墳接舊山弔回高樹下寒水自潺潺遊石壁寺寺幽稱絶境荷䇿自登臨翠嶽千峰險寒松一徑陰清香秋殿冷疏磬古廊深靜立忘歸興殘陽鳥忽吟書林處士壁高跡遠城市湖山景色奇水聲喧睡榻嵐氣逼書帷鳥語垂軒竹魚驚浸月池蒲輪來有日終負白雲期幽居塵跡不能到衡門蘚色侵古杉秋韻冷幽徑月華深窗靜猿窺硯軒間鶴聽琴東鄰有真隱荷䇿夜相尋寄湖西逸人門掩翠層層間眠枕曲肱破籬衝晚浪古屋漏秋燈月上招鄰臾詩成寄嶽僧滿朝簪組客誰識醉騰騰贈上人深居饒野興門冷入杉松鳥外間頻往人間事罕逢水軒吟片月秋榻夢千峰憶得看新雪相招靜話重送希中遊霅日暮蟬鳴急臨流動別吟片帆衝晚照歸鳥入遙林月色寒溪靜鐘聲嶽寺深蘋洲逢舊識應得話無心鷺𪆗烟雨葦森森飛翔豈易尋印沙蹤自淺傍水意還深頂撼絲難斷翎飄雪未沈終宜鴛作侶寧肯雜凡禽遠山堆青才數點杳杳幾千程幽檻葉初落高空雨乍晴崔嵬微有狀窈窕莫知名招隱誰長往眠雲自動情文君眉易似摩詰畫難成鳥去何曾到泉流豈覺聲經秋彌冷淡向晚更分明仁者由來好間觀意不輕孤山法師撰述目録凡一百七十餘卷文殊說般若經疏二卷㭊重鈔一卷般若心經疏一卷貽謀鈔一卷首楞嚴經疏一卷谷響鈔一卷疏解一卷阿彌陀經疏二卷西資鈔一卷普入不思議法門經疏一卷遺教經疏二卷瑞應經疏一卷無量義經疏一卷觀普賢行法經疏一卷注四十二章經一卷維摩經略疏垂裕記一十卷金光明經文句索隱記三卷金光明經玄義表微記一卷十六觀經疏刊正記二卷請觀音經疏闡義鈔二卷涅槃玄發源機要記二卷涅槃經疏三德指歸二十卷涅槃經百非鈔一卷蘭盆經疏托華鈔二卷金剛錍顯性録四卷法華玄記十不二門正義一卷新學擊蒙一卷間居編五十一卷自乾興元年二月十九日大法師諱智圓字無外號中庸子歸寂于錢唐西湖孤山瑪瑙院平昔所著述閒居編至今嘉祐不墜于地者猶一線耳吳待制遵路撰法師行狀云閒居編六十卷雖目其言終不能見其全集今開之本訪諸學挍及遍搜求得四十八卷病課集仍在編外今恐遺墜遂將添入總成五十一卷有求之未盡者俟後人以續之浩肱孤陋寡學不能考挍謬誤且貴乎先賢博達之文存其本而免失墜耳又得信士搖君大有因聞法師之清名賦性雅尚欣然願施財及導同人刻版模印以廣斯文時聖宋嘉祐五年歲次庚子八月既望於錢唐梵天寺十方講院了空大師浩肱字仲輔記元敬濫尸祖席起廢興墜乃其職也始來此山荒涼特甚首創塔亭且新祖像又思遺文湮沒募緣重刊得檀越施錢計二阡㭍伯劵積兩年䞋施計一阡玖伯劵甫克就緒經始於淳祐戊申訖工於寶祐癸丑吁力微難成遲遲若此此編之行蓋欲彰祖道而播餘芳資微潤而續餘𦦨耳紙墨工食之外以其所得為殿宇塔亭僧閣諸處燈油之助收贖之士仗此亦可以發自己靈光真所謂一舉而兩得矣後之住此山者當體此意毋忽焉瑪瑙住山節菴元敬題閒居編孤山雜著也歲久亡版夷齊居士章氏樂善好施崇孤山之行而貴孤山之文慨然作偈捐金二阡緡命工重刊于西湖瑪瑙然是編特孤山緒餘耳其扶掖宗教詮釋羣經有十疏別行於世云淳祐戊申秋季瑪瑙住山元敬書
